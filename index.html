<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ultimate Logistics — Procedures</title>
<style>
  :root{
    --bg:#f4f5f7; --surface:#ffffff; --ink:#1c2230; --muted:#5b6577;
    --line:#e3e6ec; --line-strong:#cdd2dc; --accent:#1f4ea1; --accent-soft:#eaf0fb;
    --chip:#1f4ea1; --good:#1f8a4c; --bad:#c0392b; --warn:#9a6b00;
    --radius:12px; --shadow:0 1px 2px rgba(20,30,50,.06),0 6px 24px rgba(20,30,50,.08);
    --mono:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5}
  button{font-family:inherit;font-size:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:inherit}
  a{color:var(--chip)}
  .hidden{display:none !important}

  /* Header */
  header{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.9);backdrop-filter:saturate(1.4) blur(8px);border-bottom:1px solid var(--line)}
  .bar{max-width:1180px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:16px}
  .brand{display:flex;align-items:baseline;gap:10px;font-weight:700;letter-spacing:.2px}
  .brand small{font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;font-size:11px}
  .views{margin-left:auto;display:flex;background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:3px}
  .views button{border:0;background:transparent;color:var(--muted);padding:7px 16px;border-radius:999px;font-weight:600}
  .views button.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}

  main{max-width:1180px;margin:0 auto;padding:22px 20px 80px}

  /* Home sections */
  .home-sec{margin-bottom:34px}
  .home-head{display:flex;align-items:center;gap:10px;margin:0 0 12px}
  .home-head h2{font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:0;font-weight:700}
  .home-head .ct{font-size:12px;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:1px 8px}
  .home-head .spacer{flex:1}
  .linklike{border:0;background:transparent;color:var(--accent);font-weight:600;font-size:13px;padding:4px}
  .empty{color:var(--muted);font-size:14px;background:var(--surface);border:1px dashed var(--line-strong);border-radius:var(--radius);padding:18px}

  /* Card grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
  .card{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px 14px 13px;box-shadow:var(--shadow);cursor:pointer;transition:transform .08s ease,border-color .12s ease}
  .card:hover{transform:translateY(-1px);border-color:var(--line-strong)}
  .card .badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.03em;color:#fff;padding:2px 9px;border-radius:999px;margin-bottom:9px}
  .card h3{margin:0;font-size:15px;line-height:1.35;font-weight:650;padding-right:24px}
  .card .pin{position:absolute;top:9px;right:9px;border:0;background:transparent;font-size:15px;opacity:0;transition:opacity .12s;line-height:1;padding:3px;border-radius:7px}
  .card:hover .pin,.card .pin.on{opacity:.9}
  .card .pin:hover{background:var(--bg)}
  .card .pin.on{opacity:1}

  /* Browse controls */
  .browse-top{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .search{flex:1;min-width:220px;display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:9px 12px}
  .search input{border:0;outline:0;background:transparent;width:100%}
  .btn{border:1px solid var(--line-strong);background:var(--surface);color:var(--ink);border-radius:10px;padding:9px 14px;font-weight:600}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{background:#173e80;color:#fff}
  .btn.danger{border-color:#e6b5ae;color:var(--bad)}
  .btn.danger:hover{background:#fdf1ef;border-color:var(--bad)}
  .btn.small{padding:5px 10px;border-radius:8px;font-size:13px}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .chip-f{border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:999px;padding:5px 12px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:7px}
  .chip-f .dot{width:9px;height:9px;border-radius:50%}
  .chip-f.on{color:#fff;border-color:transparent}

  .sec-group{margin-bottom:26px}
  .sec-group h2{font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:0 0 11px;font-weight:700;display:flex;align-items:center;gap:9px}
  .sec-group h2 .dot{width:10px;height:10px;border-radius:50%}

  /* In-progress card */
  .ip-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:13px 14px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:8px}
  .ip-card .top{display:flex;align-items:center;gap:8px}
  .ip-card .who{font-weight:650}
  .ip-card .meta{font-size:12.5px;color:var(--muted)}
  .bar-wrap{height:7px;background:var(--bg);border-radius:999px;overflow:hidden}
  .bar-fill{height:100%;background:var(--good);border-radius:999px;transition:width .2s}
  .ip-actions{display:flex;gap:8px;margin-top:2px}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(18,24,38,.42);z-index:50;display:flex;align-items:flex-start;justify-content:center;padding:34px 16px;overflow:auto}
  .modal{background:var(--surface);border-radius:16px;max-width:760px;width:100%;box-shadow:0 24px 70px rgba(15,23,42,.34);overflow:hidden}
  .m-head{display:flex;align-items:flex-start;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--surface);z-index:2}
  .m-head .t{flex:1}
  .m-head h2{margin:7px 0 0;font-size:19px;line-height:1.3}
  .m-actions{display:flex;gap:7px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
  .icon-btn{border:1px solid var(--line-strong);background:var(--surface);border-radius:9px;padding:7px 11px;font-weight:600;font-size:13px;white-space:nowrap}
  .icon-btn:hover{border-color:var(--accent);color:var(--accent)}
  .icon-btn.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .icon-btn.x{padding:7px 11px;font-size:16px;line-height:1}
  .m-body{padding:18px 22px 26px;max-height:calc(100vh - 200px);overflow:auto}

  /* Context form */
  .ctx{background:var(--accent-soft);border:1px solid #d4e0f6;border-radius:12px;padding:14px;margin-bottom:18px}
  .ctx h4{margin:0 0 10px;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--accent)}
  .ctx-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
  .field{display:flex;flex-direction:column;gap:4px}
  .field label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.02em}
  .field label.old{color:var(--bad)}
  .field label.new{color:var(--good)}
  .field input,.field select{border:1px solid var(--line-strong);border-radius:8px;padding:7px 9px;background:#fff}
  .field input:focus,.field select:focus{outline:2px solid var(--accent-soft);border-color:var(--accent)}
  .auth-split{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
  .auth-box{border-radius:9px;padding:9px;border:1px solid}
  .auth-box.old{border-color:#e6b5ae;background:#fdf3f1}
  .auth-box.new{border-color:#bfe3cc;background:#f1faf4}
  .toggle-row{display:flex;align-items:center;gap:9px;margin-top:10px;font-size:13.5px;font-weight:600}
  .toggle-row input{width:16px;height:16px}
  .ctx-apply{margin-top:12px}

  /* Content */
  .content-block{margin-bottom:18px}
  .owner-label{font-size:12px;font-weight:700;letter-spacing:.02em;color:#fff;padding:4px 11px;border-radius:8px 8px 0 0;display:inline-block}
  .owner-body{border:1px solid var(--line);border-top:0;border-radius:0 8px 8px 8px;padding:8px 6px}
  .ob-before{--ob:#1f8a4c} .ob-norush{--ob:#5b6577} .ob-kj{--ob:#7c5cff} .ob-amie{--ob:#0891b2} .ob-custom{--ob:#475569}
  .owner-label{background:var(--ob,#475569)}

  .steps{list-style:none;margin:0;padding:0;counter-reset:s}
  .row{display:flex;align-items:flex-start;gap:9px;padding:6px 6px;border-radius:8px}
  .row:hover{background:var(--bg)}
  .row.editing-on{background:#fcfcfd}
  .row .num{counter-increment:s;font-variant-numeric:tabular-nums;font-weight:700;color:var(--accent);min-width:20px;text-align:right;padding-top:1px}
  .row .num::before{content:counter(s) "."}
  .row .cb{margin-top:3px;width:16px;height:16px;flex:none}
  .row .txt{flex:1;padding-top:1px}
  .row.checked .txt{text-decoration:line-through;color:var(--muted)}
  .chip-link{font-family:var(--mono);font-size:11.5px;color:var(--chip);background:var(--accent-soft);border:1px solid #d4e0f6;border-radius:7px;padding:1px 7px;text-decoration:none;white-space:nowrap;margin-left:7px;display:inline-block;vertical-align:baseline}
  .chip-link:hover{background:#dfeafb}
  .new-auth-only{display:inline-block;font-size:10.5px;font-weight:700;color:var(--warn);background:#fff5e0;border-radius:5px;padding:0 5px;margin-left:6px;vertical-align:middle}

  /* --- saved-card date / archive / notes / custom toggles --- */
  .ip-card .when{font-size:12px;font-weight:700;color:var(--accent)}
  .ip-card .when.past{color:var(--bad)}
  .ip-card.archived{opacity:.8}
  .item-note{font-weight:700;color:var(--ink);font-size:13px;margin:2px 0 4px 27px;padding:6px 10px;background:#fff7e6;border-left:3px solid var(--warn);border-radius:0 7px 7px 0}
  .note-edit{margin:2px 0 6px 27px;display:flex;flex-direction:column;gap:6px}
  .note-edit textarea{border:1px solid var(--line-strong);border-radius:8px;padding:7px;min-height:46px;resize:vertical;font-weight:600;width:100%}
  .note-edit .row-actions{display:flex;gap:7px}
  .note-btn{border:0;background:transparent;color:var(--muted);font-size:13px;padding:2px 5px;border-radius:6px;cursor:pointer;opacity:.45;flex:none}
  .row:hover .note-btn{opacity:.95}
  .note-btn.has{opacity:1}
  .only-marker{display:inline-block;font-size:10.5px;font-weight:700;color:#5b3ea1;background:#efeaff;border-radius:5px;padding:0 5px;margin-left:6px;vertical-align:middle}
  .toggle-bar{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
  .toggle-bar .tg{display:flex;align-items:center;gap:9px;font-size:13.5px;font-weight:600;background:var(--accent-soft);border:1px solid #d4e0f6;border-radius:9px;padding:8px 11px}
  .toggle-bar .tg input{width:16px;height:16px;flex:none}
  .toggle-bar .tg .sp{flex:1}
  .archived-sec > summary{cursor:pointer;list-style:none;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700;padding:6px 0;margin-bottom:6px}
  .archived-sec > summary::-webkit-details-marker{display:none}
  .card .edited{font-size:11px;color:var(--muted);margin-top:9px}
  .review-bar{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin:-4px 0 16px}
  .review-bar .review-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .review-bar select,.review-bar input[type=date]{border:1px solid var(--line-strong);border-radius:8px;padding:6px 9px;background:#fff;font-size:13px}
  .review-bar .review-count{font-size:12.5px;color:var(--muted);font-weight:600}

  .item-ctrls{display:flex;gap:3px;align-items:center;opacity:.85}
  .mini{border:1px solid var(--line);background:#fff;border-radius:7px;padding:2px 7px;font-size:12px;line-height:1.4}
  .mini:hover{border-color:var(--accent);color:var(--accent)}
  .mini.del:hover{border-color:var(--bad);color:var(--bad)}
  .handle{cursor:grab;color:var(--muted);font-size:15px;padding:2px 4px;user-select:none;touch-action:none}
  .row.drag-ghost{opacity:.4}
  .row.drag-over-top{box-shadow:inset 0 2px 0 var(--accent)}
  .row.drag-over-bot{box-shadow:inset 0 -2px 0 var(--accent)}
  .add-item{margin:6px 4px 0}

  .disclosure{border:1px solid var(--line);border-radius:9px;margin-bottom:18px;overflow:hidden}
  .disclosure > summary{cursor:pointer;list-style:none;padding:10px 13px;font-weight:650;color:var(--muted);background:var(--bg)}
  .disclosure > summary::-webkit-details-marker{display:none}
  .disclosure[open] > summary{border-bottom:1px solid var(--line)}
  .disclosure .inner{padding:10px 12px}

  pre.email{font-family:var(--mono);font-size:13px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:14px;white-space:pre-wrap;word-break:break-word;margin:0;line-height:1.55}

  /* Edit popup */
  .popup{position:fixed;z-index:80;background:var(--surface);border:1px solid var(--line-strong);border-radius:12px;box-shadow:0 16px 48px rgba(15,23,42,.3);padding:13px;width:330px;max-width:calc(100vw - 24px)}
  .popup textarea{width:100%;min-height:62px;border:1px solid var(--line-strong);border-radius:8px;padding:8px;resize:vertical}
  .popup .field{margin-top:9px}
  .popup .pop-actions{display:flex;gap:7px;margin-top:11px;justify-content:flex-end;flex-wrap:wrap}

  /* New card builder */
  .builder .seg{border:1px solid var(--line);border-radius:11px;padding:13px;margin-bottom:14px}
  .builder .seg h4{margin:0 0 10px;font-size:13px}
  .b-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .b-row input{flex:1;border:1px solid var(--line-strong);border-radius:8px;padding:7px 9px}
  .b-block{border:1px solid var(--line);border-radius:9px;padding:10px;margin-bottom:10px}
  .b-block .bb-head{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .b-block select{border:1px solid var(--line-strong);border-radius:8px;padding:6px 8px}

  .parse-error{background:#fdf1ef;border:1px solid #e6b5ae;color:#7a241a;border-radius:10px;padding:12px 14px;margin-bottom:18px;font-size:13.5px}
  .hidden-sec .card{opacity:.7}
  .restore-row{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px}
  .restore-row .badge{font-size:11px;font-weight:700;color:#fff;padding:2px 9px;border-radius:999px}
  .restore-row .nm{flex:1}

  @media (max-width:560px){
    .bar{padding:12px 14px}
    main{padding:16px 14px 70px}
    .auth-split{grid-template-columns:1fr}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none !important}}
  :focus-visible{outline:2px solid var(--accent);outline-offset:1px}

  /* --- M365 / data integration --- */
  .auth-wrap{display:flex;align-items:center;gap:8px}
  .sync-chip{font-size:11px;font-weight:700;border-radius:999px;padding:4px 10px;border:1px solid var(--line);white-space:nowrap}
  .sync-chip.local{color:var(--muted);background:var(--bg)}
  .sync-chip.ok{color:var(--good);background:#eaf7ef;border-color:#bfe3cc}
  .sync-chip.saving{color:var(--warn);background:#fff5e0;border-color:#f0d28a}
  .sync-chip.err{color:var(--bad);background:#fdf1ef;border-color:#e6b5ae}
  .gear{border:1px solid var(--line-strong);background:var(--surface);border-radius:9px;padding:7px 10px;font-size:14px;line-height:1}
  .gear:hover{border-color:var(--accent);color:var(--accent)}
  .settings-row{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
  .settings-row label{font-size:12px;font-weight:700;color:var(--muted)}
  .settings-row select,.settings-row input{border:1px solid var(--line-strong);border-radius:8px;padding:8px 9px;background:#fff}
  .settings-status{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:16px;font-size:13px}
  .settings-status b{color:var(--ink)}
  .note{font-size:12.5px;color:var(--muted)}
  .ctx-pick{grid-column:1/-1}
</style>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
</head>
<body>

      "text": "NWE (Northwest Equipment): emailed to Amie. Amie enters in ITS, prints, gives Bill twice a month with the statement. Uploads to NWE Invoices.",

 {
  "id": "onb-fmcsa-portal",
  "section": "onboarding",
  "type": "standard",
  "title": "Create FMCSA Portal Account",
  "blocks": [
   {
    "label": "Information needed",
    "kind": "custom",
    "items": [
     {
      "text": "DOT # and DOT pin — from the FMCSA letter (Kathryn or Amie).",
      "id": "onb-fmcsa-portal-b1i1"
     },
     {
      "text": "login.gov info — email, password, backup codes (in the FMCSA checklist).",
      "linkUrl": "https://www.login.gov/",
      "linkLabel": "Login.gov",
      "id": "onb-fmcsa-portal-b1i2"
     },
     {
      "text": "Put the login.gov email into the ITS notes.",
      "id": "onb-fmcsa-portal-b1i3"
     },
     {
      "text": "Put backup codes in Office Documents > DACH > Backup Codes.",
      "id": "onb-fmcsa-portal-b1i4"
     }
    ],
    "id": "onb-fmcsa-portal-b1"
   },
   {
    "label": "Procedure",
    "kind": "before",
    "items": [
     {
      "text": "Log in to login.gov in Chrome to confirm the email is safe to use. Uncheck Remember me.",
      "id": "onb-fmcsa-portal-b2i1"
     },
     {
      "text": "Go to the FMCSA portal → Register for a Portal Account → Company User.",
      "linkUrl": "https://portal.fmcsa.dot.gov/login",
      "linkLabel": "FMCSA",
      "id": "onb-fmcsa-portal-b2i2"
     },
     {
      "text": "Enter the DOT # for lookup (pop-up should say no company representative). Enter the DOT pin.",
      "id": "onb-fmcsa-portal-b2i3"
     },
     {
      "text": "Add the company official. Reason for request: DACH → Next.",
      "id": "onb-fmcsa-portal-b2i4"
     },
     {
      "text": "Personal info is the driver’s. Email = the login.gov email; use it for User ID. Password = the login.gov password.",
      "id": "onb-fmcsa-portal-b2i5"
     },
     {
      "text": "Use the driver address from Saferweb/MCS-150. Job title: Owner. Preferred contact: Email.",
      "id": "onb-fmcsa-portal-b2i6"
     },
     {
      "text": "Agree to all three boxes and submit. Be patient — may take a minute.",
      "id": "onb-fmcsa-portal-b2i7"
     },
     {
      "text": "Log in to the portal (via login.gov) and add roles.",
      "id": "onb-fmcsa-portal-b2i8"
     },
     {
      "text": "Account Management → My Profile → View/Change Security Questions — use DACH “Carrier FMCSA Portal logins” to set Q&A.",
      "id": "onb-fmcsa-portal-b2i9"
     },
     {
      "text": "Forgot Password (top right) → use the security questions to set the password to match login.gov.",
      "id": "onb-fmcsa-portal-b2i10"
     },
     {
      "text": "My Profile → Portal Roles/USDOT# → select the DOT → add all roles one at a time EXCEPT DACH Motor Carrier (without Admin at the end).",
      "id": "onb-fmcsa-portal-b2i11"
     },
     {
      "text": "If the Company Official role is still pending, file a ticket at ask.fmcsa.dot.gov.",
      "linkUrl": "https://ask.fmcsa.dot.gov/",
      "linkLabel": "FMCSA",
      "id": "onb-fmcsa-portal-b2i12"
     }
    ],
    "id": "onb-fmcsa-portal-b2"
   }
  ]
 },

    "text": "Role: Driver. Register as a driver AND employer.",
    "id": "onb-clearinghouse-s2"
   },
   {
    "text": "Confirm Yes you have a portal account (use login.gov info). Leave alt phone blank, Next.",
    "id": "onb-clearinghouse-s3"
   },
   {
    "text": "Yes, owner-operator.",
    "id": "onb-clearinghouse-s4"
   },
   {
    "text": "C/TPAs: enter Blueline (verify exact name), check all 3 boxes. Do the same for Ultimate Innovations.",
    "id": "onb-clearinghouse-s5"
   },
   {
    "text": "Enter the driver’s CDL info.",
    "id": "onb-clearinghouse-s6"
   },
   {
    "text": "In the driver’s authority account, go to My Dashboard → Users. Invite the Amie Gmail and the Majkaela assistant accounts.",
    "id": "onb-clearinghouse-s7"
   },
   {
    "text": "Log in to both DACH accounts on a different browser to accept the invite.",
    "id": "onb-clearinghouse-s8"
   },
   {
    "text": "My Employer Profile → accept the invite, then be upgraded.",
    "id": "onb-clearinghouse-s9"
   },
   {
    "text": "Select Ultimate Innovations (admin) from the dropdown → Employers under My Profile → accept the request from the driver’s authority.",
    "id": "onb-clearinghouse-s10"
   },
   {
    "text": "On the driver’s authority account, upgrade both users to admin.",
    "id": "onb-clearinghouse-s11"
   },
   {
    "text": "Update the DACH sheet — change the driver’s authority color to green and fill the boxes (use others as reference).",
    "id": "onb-clearinghouse-s12"
   },
   {
    "text": "In the driver’s account, run the query (see Run Query on DACH) and give consent.",
    "id": "onb-clearinghouse-s13"
   }
  ]
 },
 {
  "id": "onb-run-query-dach",
  "section": "onboarding",
  "type": "standard",
  "title": "Run Query on DACH",
  "steps": [
   {
    "text": "Log into the Amie Gmail or Majkaela assistant DACH account. On the top dropdown, choose the driver’s authority.",
    "id": "onb-run-query-dach-s1"
   },
   {
    "text": "Query Overview → Purchase a Query Plan (it’ll only be 1).",
    "id": "onb-run-query-dach-s2"
   },
   {
    "text": "Select Debit/Credit Card and fill out the info.",
    "id": "onb-run-query-dach-s3"
   },
   {
    "text": "Check the authorization box and continue. Click Conduct a Query.",
    "id": "onb-run-query-dach-s4"
   },
   {
    "text": "Fill out the driver’s info → Next.",
    "id": "onb-run-query-dach-s5"
   },
   {
    "text": "Choose the full query, check the box, Next.",
    "id": "onb-run-query-dach-s6"
   },
   {
    "text": "Driver consents: in the driver’s account, switch the dropdown to Driver (instead of their authority) and click I consent.",
    "id": "onb-run-query-dach-s7"
   },
   {
    "text": "Return to your account and view the query. If anything other than “Result: Driver Not Prohibited” with a green check, tell Kage or Amie.",
    "id": "onb-run-query-dach-s8"
   },
   {
    "text": "Enter the query amount (1.25) into QuickBooks.",
    "id": "onb-run-query-dach-s9"
   }
  ]
 },
 {
  "id": "onb-motive-change-dot",
  "section": "onboarding",
  "type": "standard",
  "title": "Motive — Change Logs to New DOT",
  "blocks": [
   {
    "label": "Set up the DOT",
    "kind": "before",
    "items": [
     {
      "text": "Admin → Compliance → Edit Company → edit DOT numbers, enter DOT into the empty slot, Save (top right).",
      "linkUrl": "https://gomotive.com/",
      "linkLabel": "Motive",
      "id": "onb-motive-change-dot-b1i1"
     },
     {
      "text": "Contact KeepTrucking to approve (use the standard email — see Email Templates).",
      "id": "onb-motive-change-dot-b1i2"
     },
     {
      "text": "Admin → Compliance — scroll until the carrier’s DOT shows Active (not Pending).",
      "id": "onb-motive-change-dot-b1i3"
     }
    ],
    "id": "onb-motive-change-dot-b1"
   },
   {
    "label": "Once driver has changed authorities",
    "kind": "before",
    "items": [
     {
      "text": "Drivers → select driver → Options → Edit Account → DOT Authority → select the authority’s DOT. Save.",
      "id": "onb-motive-change-dot-b2i1"
     },
     {
      "text": "If leaving the same day: Compliance → Logs, filter by Driver, open today’s log, have the driver sign, Edit, update DOT to the new authority, Save. Motive uses the new DOT after midnight.",
      "id": "onb-motive-change-dot-b2i2"
     },
     {
      "text": "Driver/vehicle tab → Options → Edit Groups → uncheck Not Carrier Managed.",
      "id": "onb-motive-change-dot-b2i3"
     }

    "id": "onb-motive-change-dot-b2"

    "label": "Make a KT fleet manager account",

      "text": "Admin → Groups → Add Group, name it the authority’s name.",
      "id": "onb-motive-change-dot-b3i1"
     },
     {
      "text": "Manage Group → Add Driver. Vehicle tab → add vehicles.",
      "id": "onb-motive-change-dot-b3i2"
     },
     {
      "text": "Fleet Users → name + email (authority name @ultimateidaho.net), generate credentials.",
      "id": "onb-motive-change-dot-b3i3"
     },
     {
      "text": "Send the driver the Fleet Manager Account for Motive email (see Email Templates) with the username/password.",
      "id": "onb-motive-change-dot-b3i4"
     },
     {
      "text": "Drivers → select driver → Options → Edit Groups → uncheck Not Carrier Managed (if not already).",

 {
  "id": "onb-kentucky-account",
  "section": "onboarding",
  "type": "standard",
  "title": "Creating the Kentucky Account",
  "steps": [
   {
    "text": "On the KY login screen, click Create An Account.",
    "id": "onb-kentucky-account-s1"
   },
   {
    "text": "Fill out the info using the data input form and the KY password sheet.",
    "id": "onb-kentucky-account-s2"
   },
   {
    "text": "After Sign Up, the driver checks email for a KOG message — they click the link and back out.",
    "id": "onb-kentucky-account-s3"
   },
   {
    "text": "Click Sign In; sign in with the driver’s email and password. Choose Motor Carrier.",
    "id": "onb-kentucky-account-s4"
   },
   {
    "text": "Enter EIN (choose FEIN in the dropdown) and USDOT.",
    "id": "onb-kentucky-account-s5"
   },
   {
    "text": "Business Type: Sole Proprietor (enter driver name). Relationship to company: Owner. Finish.",
    "id": "onb-kentucky-account-s6"
   },
   {
    "text": "On the company home page, get the permit — only if the light on the right is yellow or green. If red, you need UCR first and come back later.",
    "id": "onb-kentucky-account-s7"
   },
   {
    "text": "What Can I Do? → KYU Online – Manage or Apply for KYU License.",
    "id": "onb-kentucky-account-s8"
   },
   {
    "text": "Yes, trucks are plated for more than 59,999 (80,000). Apply for a permanent permit.",
    "id": "onb-kentucky-account-s9"
   },
   {
    "text": "Enter the EIN and select FEIN. Add the driver’s name and remove the last four zip digits. Verify and continue.",
    "id": "onb-kentucky-account-s10"
   },
   {
    "text": "Add Vehicle → Continue (not Save and Exit). Verify again.",
    "id": "onb-kentucky-account-s11"
   },
   {
    "text": "Copy/paste the KYU # into the KY password sheet. Print the KYU letter for the file.",
    "id": "onb-kentucky-account-s12"
   }
  ]
 },
 {
  "id": "onb-newmexico-account",
  "section": "onboarding",
  "type": "standard",
  "title": "Creating the New Mexico Account",
  "steps": [
   {
    "text": "Click Create a Logon → Commercial Vehicle Carrier.",
    "id": "onb-newmexico-account-s1"
   },
   {
    "text": "Entity Type: Ltd. Liability Company (LLC). Legal Name is the authority (not the driver). Leave DBA blank.",
    "id": "onb-newmexico-account-s2"
   },
   {
    "text": "No, not signing up on behalf of another taxpayer. No separate mailing address.",
    "id": "onb-newmexico-account-s3"
   },
   {
    "text": "Add a corporate officer: From = driver hire date; To = 1/1/2030; Type = Owner, 100% ownership; ID Type = Driver SSN. Use driver info for name/email/phone/address.",
    "id": "onb-newmexico-account-s4"
   },
   {
    "text": "Choose Weight Distance (Permit & Tax). Not a one-way hauler — just enter the DOT.",
    "id": "onb-newmexico-account-s5"
   },
   {
    "text": "Use the driver’s email (Use Email: Yes). Password is on the NM password sheet.",
    "id": "onb-newmexico-account-s6"
   },
   {
    "text": "Login is the driver email (Yes on Use Email). Name is the driver’s name. Don’t attach anything.",
    "id": "onb-newmexico-account-s7"
   },
   {
    "text": "On the homepage, Lookup Weight Distance Number → enter EIN and DOT.",
    "id": "onb-newmexico-account-s8"
   },
   {
    "text": "Copy the WDT# into the NM password sheet and write it into the NM POA (NM ID, top right). Scan the POA to attach.",
    "id": "onb-newmexico-account-s9"
   },
   {
    "text": "Log in to UltInnovations (parent account) → More… → Add Access to Another Account.",
    "id": "onb-newmexico-account-s10"
   },
   {
    "text": "Account Type: Weight Distance (Permit & Tax) → Continue to the Authorization page.",
    "id": "onb-newmexico-account-s11"
   },
   {
    "text": "Attach Completed Form ACD-31102 Tax Information Authorization and continue. Account is set up — you can get permits.",
    "id": "onb-newmexico-account-s12"
   }
  ]
 },
 {
  "id": "onb-greenlight-prepass",
  "section": "onboarding",
  "type": "standard",
  "title": "Greenlight (PrePass)",
  "steps": [
   {
    "text": "Log in to PrePass. Also open the DRIVERS & TRUCK NUMBERS KJV sheet — Scale/Toll Transponders tab — and the OR Account #s sheet (PrePass tab).",
    "linkUrl": "https://docs.google.com/spreadsheets/d/1H2EplK5zhZigavfHJlak4OqnYiA-oW-IDw69NhFqefo/edit",
    "linkLabel": "KJV Sheet",
    "id": "onb-greenlight-prepass-s1"
   },
   {
    "text": "Using the PrePass tab, paste the OLD authority PrePass # into the PrePass search bar (the authority the transponder was under before). If the truck isn’t assigned yet, skip removing it.",
    "id": "onb-greenlight-prepass-s2"
   },
   {
    "text": "Equipment Management → select the old truck → Unassign Transponder → Return to Customer Inventory. If not the last truck on the account, also check Delete the source equipment.",
    "id": "onb-greenlight-prepass-s3"
   },
   {
    "text": "Save; don’t assign a new transponder on the next page — Cancel and Save again.",
    "id": "onb-greenlight-prepass-s4"
   },
   {
    "text": "Back to My PrePass → paste the new authority’s PrePass # into the search bar.",
    "id": "onb-greenlight-prepass-s5"
   },
   {
    "text": "Equipment Management → Add Equipment (click Add Equipment again on the next page).",
    "id": "onb-greenlight-prepass-s6"
   },
   {
    "text": "Travel type: Interstate. Check the middle (IFTA) and last (IRP) boxes. If not present, Add New and enter the IFTA/IRP numbers from the OR accounts sheet.",
    "id": "onb-greenlight-prepass-s7"
   },
   {
    "text": "Continue. Add the equipment ID and VIN. Verify the info pulled (plate #, etc.).",
    "id": "onb-greenlight-prepass-s8"
   },
   {
    "text": "Jurisdiction States: should be filled; if not, select all EXCEPT AK, HI, PR, NF, NT, PQ, YT. For Canada, check the box and enter 36287.",
    "id": "onb-greenlight-prepass-s9"
   },
   {
    "text": "Need a transponder: No (Yes only if ordering new — pick the address with Amie’s name). Hauls hazmat: No.",
    "id": "onb-greenlight-prepass-s10"
   },
   {
    "text": "Search a transponder by ID (or add 3rd party, Best Pass). Enter the transponder ID, select, OK the Device Transfer Warning, Save.",
    "id": "onb-greenlight-prepass-s11"
   },
   {
    "text": "Complete equipment submission. Close and Done.",
    "id": "onb-greenlight-prepass-s12"
   },
   {
    "text": "Update the KJV Scale/Toll Transponders tab: cut/paste the transponder # from old to new truck, note updated MM/DD/YY, confirm the authority is correct.",
    "linkUrl": "https://docs.google.com/spreadsheets/d/1H2EplK5zhZigavfHJlak4OqnYiA-oW-IDw69NhFqefo/edit",
    "linkLabel": "KJV Sheet",
    "id": "onb-greenlight-prepass-s13"
   }
  ]
 },
 {

  "type": "standard",
  "title": "Best Pass — White Bar",
  "blocks": [
   {
    "label": "Best Pass",
    "kind": "custom",
    "items": [
     {
      "text": "Take a picture of the white bar and send to Amie to update the KJV Scale/Toll Transponders tab.",
      "linkUrl": "https://docs.google.com/spreadsheets/d/1H2EplK5zhZigavfHJlak4OqnYiA-oW-IDw69NhFqefo/edit",
      "linkLabel": "KJV Sheet",
      "id": "onb-bestpass-whitebar-b1i1"
     },
     {
      "text": "In Best Pass, Vehicles & Devices → select the truck.",
      "id": "onb-bestpass-whitebar-b1i2"
     },
     {
      "text": "Look up the device number in Quick Assign (# under the barcode on the right).",
      "id": "onb-bestpass-whitebar-b1i3"
     },
     {
      "text": "A pop-up asks to replace all transponders — confirm #s match the bar and accept.",
      "id": "onb-bestpass-whitebar-b1i4"

     {
      "text": "Double-check your changes saved.",
      "id": "onb-bestpass-whitebar-b1i5"
     }
    ],
    "id": "onb-bestpass-whitebar-b1"
   },
   {
    "label": "Prepass",
    "kind": "custom",
    "items": [
     {
      "text": "Prepass → select the authority the truck is under.",
      "id": "onb-bestpass-whitebar-b2i1"
     },
     {
      "text": "Equipment Management → select the truck → Unassign Transponder → Return to Customer Inventory.",
      "id": "onb-bestpass-whitebar-b2i2"
     },
     {
      "text": "Assign the new transponder using the Prepass # on the white bar. Save.",
      "id": "onb-bestpass-whitebar-b2i3"
     }
    ],
    "id": "onb-bestpass-whitebar-b2"
   },
   {
    "label": "Prepass (Oregon)",
    "kind": "custom",
    "items": [
     {
      "text": "Log in to your Oregon account → Transponder → Manage/Review Transponders.",
      "id": "onb-bestpass-whitebar-b3i1"
     },
     {
      "text": "Search to show all trucks → Add → type the transponder #.",
      "id": "onb-bestpass-whitebar-b3i2"
     },
     {
      "text": "Enter Amie Butler, Account Service Manager, etc. Save.",
      "id": "onb-bestpass-whitebar-b3i3"
     }
    ],
    "id": "onb-bestpass-whitebar-b3"
   }
  ]
 },

  "section": "onboarding",

  "steps": [

 },
 {
  "id": "onb-pkg-new-driver",
  "section": "onboarding",
  "type": "standard",
  "title": "Driver Packages — New Driver",
  "blocks": [
   {
    "label": "Paper parts",
    "kind": "custom",
    "items": [
     {
      "text": "60/40 package — the 1-pg lease with Temp Authority. Need all the info (ask Bill or wait for Kathryn’s emails).",
      "id": "onb-pkg-new-driver-b1i1"
     },
     {
      "text": "Two Page Lease — between Ultimate Logistics and the driver’s LLC.",
      "id": "onb-pkg-new-driver-b1i2"
     },
     {
      "text": "Idaho LLC Operating Agreement — for the bank, with the LLC and IRS letter Kathryn emails. Change the D&A policy date to current date.",
      "id": "onb-pkg-new-driver-b1i3"
     },
     {
      "text": "Blank insurance cancellation request — driver signs as named insured. Do not date.",
      "id": "onb-pkg-new-driver-b1i4"
     },
     {
      "text": "Safety Responsibility Statement for temp authority.",
      "id": "onb-pkg-new-driver-b1i5"
     },
     {
      "text": "Truck Docs (see Truck Docs).",
      "id": "onb-pkg-new-driver-b1i6"
     }
    ],
    "id": "onb-pkg-new-driver-b1"
   },
   {
    "label": "Order PSP",
    "kind": "before",
    "items": [
     {
      "text": "Log in to MVRcheck.com → Order → New Order.",
      "linkUrl": "https://www.mvrcheck.com/",
      "linkLabel": "MVRcheck",
      "id": "onb-pkg-new-driver-b2i1"
     },
     {
      "text": "Select PSP Crash and Inspection History → QuickApp.",
      "id": "onb-pkg-new-driver-b2i2"
     },
     {
      "text": "Input the driver’s Last and First name plus email. Send.",
      "id": "onb-pkg-new-driver-b2i3"
     }
    ],
    "id": "onb-pkg-new-driver-b2"
   },
   {
    "label": "Order background check",
    "kind": "before",
    "items": [
     {
      "text": "Log in to bluelinebackgrounds.com → Order → New Order.",
      "linkUrl": "https://www.bluelinebackgrounds.com/",
      "linkLabel": "Blueline",
      "id": "onb-pkg-new-driver-b3i1"
     },
     {
      "text": "Choose Blueline National Plus (the only one we order) → QuickApp.",
      "id": "onb-pkg-new-driver-b3i2"
     },
     {
      "text": "Input the driver’s Last and First name plus email. Send.",
      "id": "onb-pkg-new-driver-b3i3"
     },
     {
      "text": "If they email back about records found in a county, always say yes (extra cost, worth it).",
      "id": "onb-pkg-new-driver-b3i4"
     }
    ],
    "id": "onb-pkg-new-driver-b3"
   },
   {
    "label": "Update systems",
    "kind": "norush",
    "items": [
     {
      "text": "Fleet Master Sheet → Drivers tab (Driver ID, name, CDL #, CDL state, CDL Exp, Medical Exp) and Assignments tab.",
      "linkUrl": "https://ultimatecorp.sharepoint.com/sites/UltimateLogisticsLLC",
      "linkLabel": "SharePoint",
      "id": "onb-pkg-new-driver-b4i1"
     },
     {
      "text": "Add driver to ITSD: Admin → Drivers → Add. Paste from the 60/40 package. Notes: Temp Authority [auth] and CDL State.",
      "id": "onb-pkg-new-driver-b4i2"
     },
     {
      "text": "ITSD Pay tab → Pay Type %; Standard 60%, FSC 60%, Additional Charges 0%. Save.",
      "id": "onb-pkg-new-driver-b4i3"
     },
     {
      "text": "Add driver to KT: Admin → Drivers → Add Driver. Fill Name, Email, Phone, CDL, Username (simplified auth name).",
      "id": "onb-pkg-new-driver-b4i4"
     },
     {
      "text": "KT: select Electronic Logs Required and Compliance Mode ELD. Home Terminal Time: Mountain. Check Yard Move and Personal Conveyance. NOT Manual Drive.",
      "id": "onb-pkg-new-driver-b4i5"
     },
     {
      "text": "KT: select DOT # for Temporary Authority. Home Terminal Address = 4663 S Enterprise St. Cycle: 70HR USA, 34hr reset, 30min break. Save (top right).",
      "id": "onb-pkg-new-driver-b4i6"
     },
     {
      "text": "Run Full Pre-employment Query on DACH under Temporary Authority (see Run Query on DACH).",
      "id": "onb-pkg-new-driver-b4i7"
     },
     {
      "text": "Email the driver (cc Kage) the Ultimate Onboarding email (see Email Templates) — only after running the query.",
      "id": "onb-pkg-new-driver-b4i8"
     },
     {
      "text": "Add to the Payroll Line Items sheet. Example: Studor, Robert, TRK PMT, truck 705 payment $1,000 after lease program. Start 2/28.",
      "id": "onb-pkg-new-driver-b4i9"
     }
    ],
    "id": "onb-pkg-new-driver-b4"
   }
  ]
 },

 {
  "id": "onb-driver-books",
  "section": "onboarding",
  "type": "standard",
  "title": "Driver Books",
  "steps": [
   {
    "text": "Grab a binder (or more), 16 Driver Daily Logs (red/cream w/ 2nd page), clear sheet protectors, and trippaks.",
    "id": "onb-driver-books-s1"
   },
   {
    "text": "Print the most recent Driver Book file double-sided.",
    "id": "onb-driver-books-s2"
   },
   {
    "text": "Grab the 2 Motive ELD sheets (Bluetooth card + Motive booklet). Print double-sided booklet.",
    "id": "onb-driver-books-s3"
   },
   {
    "text": "Trippaks in the right pocket; Motive sheets in the left pocket.",
    "id": "onb-driver-books-s4"
   },

    "text": "Query Overview → Purchase a Query Plan → select # of drivers under the authority (usually 1).",

    "text": "Debit/Credit Card → fill the next screen → check authorization → continue.",

 {
  "id": "eqp-quartix-check",
  "section": "equipment",
  "type": "standard",
  "title": "Quartix Check",
  "steps": [
   {
    "text": "Equipment > Quartix > Quartix Check Template — add a new sheet.",
    "linkUrl": "https://www.quartix.com/",
    "linkLabel": "Quartix",
    "id": "eqp-quartix-check-s1"
   },
   {
    "text": "In Quartix, Live Tracking. Group: All, Vehicle: All.",
    "id": "eqp-quartix-check-s2"
   },
   {
    "text": "Copy/paste without formatting (Ctrl+Shift+V) the entire data text into the Quartix sheet.",
    "id": "eqp-quartix-check-s3"
   },
   {
    "text": "Delete everything besides the description (driver name), unit number, and date/time/location column.",
    "id": "eqp-quartix-check-s4"
   },
   {
    "text": "Select date/time/location → Find and Replace: replace “on” with + and “since” (trigger words at the start of each entry).",
    "id": "eqp-quartix-check-s5"
   },
   {
    "text": "Text to Columns, split on +. Double-check rows that didn’t format.",
    "id": "eqp-quartix-check-s6"
   },
   {
    "text": "Sort by date/time. Delete any from the past couple days (likely fine).",
    "id": "eqp-quartix-check-s7"
   },
   {
    "text": "For the rest, compare to ITSD: had loads since the last reading? If yes, the truck is moving — delete that row. If no, Quartix may be broken.",
    "id": "eqp-quartix-check-s8"
   },
   {
    "text": "Highlight new broken ones in red; email the Excel to Kathryn, Amie, and Brett.",
    "id": "eqp-quartix-check-s9"
   },
   {
    "text": "Email the driver and dispatcher that the Quartix needs to be looked at.",
    "id": "eqp-quartix-check-s10"
   }
  ]
 },
 {
  "id": "eqp-quartix-update",
  "section": "equipment",
  "type": "standard",
  "title": "Quartix Change/Update",
  "blocks": [
   {
    "label": "Edit OLD Quartix",
    "kind": "custom",
    "items": [
     {
      "text": "Log in to Quartix (admin) → Configure → Vehicles.",
      "linkUrl": "https://www.quartix.com/",
      "linkLabel": "Quartix",
      "id": "eqp-quartix-update-b1i1"
     },
     {
      "text": "Copy the Quartix # from Description to Registration # (keep in Description too).",
      "id": "eqp-quartix-update-b1i2"
     },
     {
      "text": "Change Description to Not Working [qtx#]. Move out of all groups. Delete the initials (truck number). Save.",
      "id": "eqp-quartix-update-b1i3"
     }
    ],
    "id": "eqp-quartix-update-b1"
   },
   {
    "label": "Edit NEW Quartix (probably under “Shipped Unit”)",
    "kind": "custom",
    "items": [
     {
      "text": "Move the Quartix # to Description. Add the driver’s name (e.g., Bob Jamison 65489).",
      "id": "eqp-quartix-update-b2i1"
     },
     {
      "text": "Registration # = truck # (e.g., ULT 699). Time zone: Mountain.",
      "id": "eqp-quartix-update-b2i2"
     },
     {
      "text": "Move to Dispatcher group, All, and Active group. Icon = black van.",
      "id": "eqp-quartix-update-b2i3"
     },
     {
      "text": "Initials = truck # (without ULT). Save.",
      "id": "eqp-quartix-update-b2i4"
     }
    ],
    "id": "eqp-quartix-update-b2"
   },
   {
    "label": "Then",
    "kind": "norush",
    "items": [
     {
      "text": "Update the Current Quartix sheet AND the Master Quartix list. Do not delete/replace — use commas for notes and add lines for new trucks.",
      "id": "eqp-quartix-update-b3i1"
     }
    ],
    "id": "eqp-quartix-update-b3"
   }
  ]
 },
 {
  "id": "fuel-card-transfer",
  "section": "fuel",
  "type": "standard",
  "title": "Fuel Cards — Transfer",
  "steps": [
   {
    "text": "Go to the EFS website and log in.",
    "linkUrl": "https://www.efsllc.com/",
    "linkLabel": "EFS",
    "id": "fuel-card-transfer-s1"
   },
   {
    "text": "Program → Manage Cards → View/Update Cards.",
    "id": "fuel-card-transfer-s2"
   },
   {
    "text": "Look up the card by last 8 digits or driver name.",
    "id": "fuel-card-transfer-s3"
   },
   {
    "text": "Old card first: select Inactive under Card Status. Write down driver ID (or 4-digit pin). Save and go back.",
    "id": "fuel-card-transfer-s4"
   },
   {
    "text": "New card: select Active. Click Reset PIN. Edit Driver ID — Validation: Exact Match, enter driver’s ID.",
    "id": "fuel-card-transfer-s5"
   },
   {
    "text": "Edit Driver Name — Validation: Report Only, enter driver’s name (Last First). Save.",
    "id": "fuel-card-transfer-s6"
   },
   {
    "text": "Fill out the Ultimate Fuel Card page for the carrier file.",
    "id": "fuel-card-transfer-s7"
   }
  ]
 },
 {
  "id": "fuel-locked-out",
  "section": "fuel",
  "type": "standard",
  "title": "Fuel Card — Driver Locked Out (WEX)",
  "steps": [
   {
    "text": "Get the full card #; log in to WEX so you’re looking at the card.",
    "id": "fuel-locked-out-s1"
   },
   {
    "text": "Call WEX: 888-824-7378. Press 2 for Carrier.",
    "id": "fuel-locked-out-s2"
   },
   {
    "text": "Enter the carrier ID / call-in ID / PIN from the WEX call sheet.",
    "id": "fuel-locked-out-s3"
   },
   {
    "text": "Press 6 for online support. They repeat it — press 1 for Yes, 2 for No.",
    "id": "fuel-locked-out-s4"
   },
   {
    "text": "Say the driver got locked out of the app and you need to unsuspend them.",
    "id": "fuel-locked-out-s5"
   },
   {
    "text": "Company: Ultimate Logistics. Name: Majkaela Holt. Email: efsfuel@ultimateidaho.net.",
    "id": "fuel-locked-out-s6"
   },
   {
    "text": "Reset PIN on WEX. Tell the driver to use the last 4 of the card # for PIN to log in.",
    "id": "fuel-locked-out-s7"
   },
   {
    "text": "Merchant code 5441 means pay at the pump.",
    "id": "fuel-locked-out-s8"
   }
  ]
 },
 {
  "id": "fuel-efs-codes",
  "section": "fuel",
  "type": "standard",
  "title": "EFS Codes",
  "blocks": [
   {
    "label": "Pull and process",
    "kind": "before",
    "items": [
     {
      "text": "In EFS, go to EFS Codes Report.",
      "linkUrl": "https://www.efsllc.com/",
      "linkLabel": "EFS",
      "id": "fuel-efs-codes-b1i1"
     },
     {
      "text": "Select the date range (the day before; include Fri–Sun if it’s Monday).",
      "id": "fuel-efs-codes-b1i2"
     },
     {
      "text": "View Format Type: Excel. Submit. Download, open, enable editing.",
      "id": "fuel-efs-codes-b1i3"
     },
     {
      "text": "Fix any spelling errors in the Notes column.",
      "id": "fuel-efs-codes-b1i4"
     },
     {
      "text": "Developer → Macros → run the EFSCodes macro (see Excel Macros).",
      "id": "fuel-efs-codes-b1i5"
     },
     {
      "text": "First tab pastes into the EFS Money Codes sheet (Ctrl+Shift+V).",
      "id": "fuel-efs-codes-b1i6"
     },
     {
      "text": "Second tab (Sorted Data) emails to Office Team and Dispatchers. Paste with Ctrl+V then choose Keep Source Formatting.",
      "id": "fuel-efs-codes-b1i7"
     }
    ],
    "id": "fuel-efs-codes-b1"
   },
   {
    "label": "Printing truck repair codes for Bill",
    "kind": "custom",
    "items": [
     {
      "text": "Delete all rows except truck repair EFS Codes. Remove borders.",
      "id": "fuel-efs-codes-b2i1"
     },
     {
      "text": "Select the data (or it prints 12+ pages).",
      "id": "fuel-efs-codes-b2i2"
     },
     {
      "text": "File → Print: Print Selection, Portrait, Normal margins, Page Setup scaling 150%.",
      "id": "fuel-efs-codes-b2i3"
     },
     {
      "text": "Print, fold in half, give to Bill.",
      "id": "fuel-efs-codes-b2i4"
     }
    ],
    "id": "fuel-efs-codes-b2"
   }
  ]
 },
 {
  "id": "fuel-factoring-transflo",
  "section": "fuel",
  "type": "standard",
  "title": "Factoring — Transflo",
  "steps": [
   {
    "text": "Go to the Transflo website and log in.",
    "id": "fuel-factoring-transflo-s1"
   },
   {
    "text": "Choose the date range (usually today, sometimes also yesterday) and search.",
    "id": "fuel-factoring-transflo-s2"
   },
   {
    "text": "Start where you left off. Click the Confirmation Number (e.g., MP206CES9C2KQQWT).",
    "id": "fuel-factoring-transflo-s3"
   },
   {
    "text": "View as PDF. Using the trippak cover or BOL, find its load in ITS.",
    "id": "fuel-factoring-transflo-s4"
   },
   {
    "text": "Mark the load Unloading; go into the load.",
    "id": "fuel-factoring-transflo-s5"
   },
   {
    "text": "Attach the Transflo, mark Completed, save, exit.",
    "id": "fuel-factoring-transflo-s6"
   },
   {
    "text": "If the Transflo has a lumper: add to Other Charges, email the dispatcher for a revised rate con (attach the Transflo), add to the Factoring sheet. Attach the revised when received and delete from the working sheet.",
    "id": "fuel-factoring-transflo-s7"
   }
  ]
 },
 {
  "id": "fuel-factoring-ratecons",
  "section": "fuel",
  "type": "standard",
  "title": "Factoring — Ratecons",
  "steps": [
   {
    "text": "Open a yellow N/A load and go to its files. Download the ratecon.",
    "id": "fuel-factoring-ratecons-s1"
   },
   {
    "text": "Confirm it matches the customer on the load.",
    "id": "fuel-factoring-ratecons-s2"
   },
   {
    "text": "Click the pencil next to the W/O; input the driver’s name under the ULI.",
    "id": "fuel-factoring-ratecons-s3"
   },
   {
    "text": "Exit and fill out: W/O, Shipper, Consignee, both Dates.",
    "id": "fuel-factoring-ratecons-s4"
   },
   {
    "text": "Click the calculator at the bottom to configure the miles.",
    "id": "fuel-factoring-ratecons-s5"
   },
   {
    "text": "Mark the load Open, save, exit.",
    "id": "fuel-factoring-ratecons-s6"
   }
  ]
 },
 {
  "id": "fuel-factoring-invoicing",
  "section": "fuel",
  "type": "standard",
  "title": "Factoring — Invoicing Loads",
  "steps": [
   {
    "text": "In ITS, start on the Delivered/Completed Loads tab.",
    "id": "fuel-factoring-invoicing-s1"
   },
   {
    "text": "Accounting → Accounting Manager → Completed tab. Check a load (skip any awaiting a revised ratecon) → Invoice (top right).",
    "id": "fuel-factoring-invoicing-s2"
   },
   {
    "text": "Exit Accounting Manager; open the invoiced load from Delivered/Completed.",
    "id": "fuel-factoring-invoicing-s3"
   },
   {
    "text": "Files → download the Transflo (BOLs) and the ratecon.",
    "id": "fuel-factoring-invoicing-s4"
   },
   {
    "text": "In PDFsam: Invoice first, BOLs next, ratecon last.",
    "id": "fuel-factoring-invoicing-s5"
   },
   {
    "text": "Triple-check ITS, ratecon, and Transflo BOLs all match.",
    "id": "fuel-factoring-invoicing-s6"
   },
   {
    "text": "Save as Broker#loadnumber_FFG; attach to the load’s files.",
    "id": "fuel-factoring-invoicing-s7"
   },
   {
    "text": "Open the Broker info (i by broker name) → Advanced tab → EMAIL TO or ORIGINALS REQUIRED.",
    "id": "fuel-factoring-invoicing-s8"
   },
   {
    "text": "Email the invoice to that address, subject Load #[W/O] (e.g., Load #000234).",
    "id": "fuel-factoring-invoicing-s9"
   },
   {
    "text": "If OG required, no email needed (unless an email is also listed).",
    "id": "fuel-factoring-invoicing-s10"
   },
   {
    "text": "In the load notes, put Emailed M/D/Y MH. Enter the load into the Factoring sheet.",
    "id": "fuel-factoring-invoicing-s11"
   }
  ]
 },
 {
  "id": "motive-pull-codes",
  "section": "motive",
  "type": "standard",
  "title": "Pulling Codes for Trucks",
  "steps": [
   {
    "text": "Go to Reports → Fault Codes.",
    "linkUrl": "https://gomotive.com/",
    "linkLabel": "Motive",
    "id": "motive-pull-codes-s1"
   },
   {
    "text": "Enter the vehicle in Select Vehicle.",
    "id": "motive-pull-codes-s2"
   },
   {
    "text": "Options → Export to PDF (top right). The report is emailed to you.",
    "id": "motive-pull-codes-s3"
   }
  ]
 },
 {
  "id": "motive-send-logs",
  "section": "motive",
  "type": "standard",
  "title": "Sending Logs (for Audits)",
  "steps": [
   {
    "text": "Compliance → Send Output File (top right).",
    "linkUrl": "https://gomotive.com/",
    "linkLabel": "Motive",
    "id": "motive-send-logs-s1"
   },
   {
    "text": "Click Drivers; select the driver the audit is for.",
    "id": "motive-send-logs-s2"
   },
   {
    "text": "Select the date range (first 30 days — if 31 days, skip the last day).",
    "id": "motive-send-logs-s3"
   },
   {
    "text": "Add the NEWS-###### pin from FMCSA into the comment box.",
    "id": "motive-send-logs-s4"
   },
   {
    "text": "Go to the FMCSA new-entrant site.",
    "linkUrl": "https://ai.fmcsa.dot.gov/newentrant/Home.aspx",
    "linkLabel": "FMCSA",
    "id": "motive-send-logs-s5"
   },
   {
    "text": "Log in under “Received an Offsite Safety Audit letter?” (login in the Carrier Info sheet).",
    "id": "motive-send-logs-s6"
   },
   {
    "text": "Upload Here (right side). Copy the NEWS-###### pin. Send.",
    "id": "motive-send-logs-s7"
   },
   {
    "text": "You should get an email confirming it was sent to the DOT.",
    "id": "motive-send-logs-s8"
   }
  ]
 },
 {
  "id": "pay-luke-hours",
  "section": "payroll",
  "type": "standard",
  "title": "Luke’s Hours Per Pay-Period",
  "blocks": [
   {
    "label": "With macros",
    "kind": "before",
    "items": [
     {
      "text": "ITS → Maintenance → Actual Service. Change dates to Luke’s pay period. Download Excel.",
      "id": "pay-luke-hours-b1i1"
     },
     {
      "text": "Run the ActualServiceLukeHours macro (Developer → Macros). See Excel Macros if not installed.",
      "id": "pay-luke-hours-b1i2"
     },
     {
      "text": "Expand all columns to fit. Delete column B (Bannon LLC).",
      "id": "pay-luke-hours-b1i3"
     },
     {
      "text": "Run ActualServiceLukeAddNames: open Fleet Master Sheet → Current Roster, copy First/Last/Truck #/Authority, paste without formatting on a new tab (Sheet1).",
      "id": "pay-luke-hours-b1i4"
     },
     {
      "text": "Delete column B (Driver Company Name). Back to the worksheet (don’t run on Sheet1). Run ActualServicesLukeAddNames.",
      "id": "pay-luke-hours-b1i5"
     },
     {
      "text": "Wrap text on the Notes column and fit the printable area.",
      "id": "pay-luke-hours-b1i6"
     }
    ],
    "id": "pay-luke-hours-b1"
   },
   {
    "label": "Manual (no macros)",
    "kind": "custom",
    "items": [
     {
      "text": "Delete the Category column.",
      "id": "pay-luke-hours-b2i1"
     },
     {
      "text": "Sort by Vendor, delete anything other than Bannon Truck Repair. Sort by Date.",
      "id": "pay-luke-hours-b2i2"
     },
     {
      "text": "Insert a Hours column left of Amount. Formula = Amount / 45; paste down.",
      "id": "pay-luke-hours-b2i3"
     },
     {
      "text": "Format Amount as currency. Notes width to landscape page width, wrap text.",
      "id": "pay-luke-hours-b2i4"
     },
     {
      "text": "Auto-sum Hours and Amount; put Totals in the cell before the sums.",
      "id": "pay-luke-hours-b2i5"
     }
    ],
    "id": "pay-luke-hours-b2"
   }
  ]
 },
 {
  "id": "pay-driver-repairs",
  "section": "payroll",
  "type": "standard",
  "title": "Driver Repairs Per Month",
  "steps": [
   {
    "text": "Do Luke’s Hours but for the whole month.",
    "id": "pay-driver-repairs-s1"
   },
   {
    "text": "ITS → Maintenance → Actual Service → All Trucks → whole month. Download Excel.",
    "id": "pay-driver-repairs-s2"
   },
   {
    "text": "Run ActualServiceSTEP0 (highlights duplicate amounts).",
    "id": "pay-driver-repairs-s3"
   },
   {
    "text": "Sort by Parts then Amount, delete duplicates. Sort by Equipment, delete duplicates. Sort by Amount, delete duplicates. Remove leftover highlights.",
    "id": "pay-driver-repairs-s4"
   },
   {
    "text": "Sort by Equipment then Date. Run ActualServiceSTEP1 (PM and battery $ amounts).",
    "id": "pay-driver-repairs-s5"
   },
   {
    "text": "Ctrl+F batteries → if APU/EPU, change 1000 to 1600. Ctrl+F driver paid / credits.",
    "id": "pay-driver-repairs-s6"
   },
   {
    "text": "Save a copy before totaling. Run ActualServiceSTEP2 (totals and spacing).",
    "id": "pay-driver-repairs-s7"
   },
   {
    "text": "Fleet Master Sheet → Current Roster: copy First/Last/Truck #/Authority, paste values to Sheet1, delete the Authority column, back to main worksheet.",
    "id": "pay-driver-repairs-s8"
   },
   {
    "text": "Run ActualServiceSTEP3 (names and totals). Delete the Hours column.",
    "id": "pay-driver-repairs-s9"
   },
   {
    "text": "Highlight anyone over $1000 (Highlight Rows macro). Save the highlighted copy to Office Documents > Payroll > [year] Payroll Files.",
    "id": "pay-driver-repairs-s10"
   },
   {
    "text": "Delete under-$1k drivers. Save for cloud and print for Bill (goal: who owes money).",
    "id": "pay-driver-repairs-s11"
   }
  ]
 },
 {
  "id": "pay-fuel-report",
  "section": "payroll",
  "type": "standard",
  "title": "Fuel Report",
  "steps": [
   {
    "text": "EFS website → log in.",
    "linkUrl": "https://www.efsllc.com/",
    "linkLabel": "EFS",
    "id": "pay-fuel-report-s1"
   },
   {
    "text": "Transaction Report → payroll date range (1st–15th or 16th–31st) → page break, show discount detail, group/sort by driver name. View: PDF. Submit.",
    "id": "pay-fuel-report-s2"
   },
   {
    "text": "Open in PDF-XChange Editor. Top right Search to highlight data.",
    "id": "pay-fuel-report-s3"
   },
   {
    "text": "Open the Fuel Report Highlight notes and paste each into the search bar; after each, Options → Annotate Search Results → Highlight.",
    "id": "pay-fuel-report-s4"
   },
   {
    "text": "Save and re-open in PDFsam.",
    "id": "pay-fuel-report-s5"
   },
   {
    "text": "Per driver, add the total Scales amount with fees (e.g., scales: 13 + 1 = 14).",
    "id": "pay-fuel-report-s6"
   },
   {
    "text": "If the scale total is uneven (e.g., 11.78), add STAX tax (11.78 + 0.72 = 12.50).",
    "id": "pay-fuel-report-s7"
   },
   {
    "text": "Green highlight = cash advance: subtract the total advance from the bottom-left box.",
    "id": "pay-fuel-report-s8"
   },
   {
    "text": "No scales and no cash advances — skip.",
    "id": "pay-fuel-report-s9"
   },
   {
    "text": "Email to KJ and Carol (with the bonus miles report). Upload to Office Documents > Payroll > [year] Payroll Files.",
    "id": "pay-fuel-report-s10"
   }
  ]
 },
 {
  "id": "pay-fuel-bonus-new",
  "section": "payroll",
  "type": "standard",
  "title": "Driver Fuel Bonus — NEW WAY",
  "steps": [
   {
    "text": "In ITSD, get the Driver report for All Drivers, filter by Delivery Date. Payroll range, Miles + Origin/Destination columns.",
    "id": "pay-fuel-bonus-new-s1"
   },
   {
    "text": "Run BonusMilesHighlight; review highlights and fix any Driver Miles discrepancies.",
    "id": "pay-fuel-bonus-new-s2"
   },
   {
    "text": "Run BonusMilesConfiguration to get bonus amounts. Paste Line Items sheet into Line Items.",
    "id": "pay-fuel-bonus-new-s3"
   }
  ]
 },
 {
  "id": "pay-fuel-bonus-old",
  "section": "payroll",
  "type": "standard",
  "title": "Driver Fuel Bonus — OLD WAY",
  "blocks": [
   {
    "label": "Setup",
    "kind": "custom",
    "items": [
     {
      "text": "Copy the Bonus miles draft template (Office Documents > Payroll > Templates Forms Instructions etc). Grab miles from three sources below.",
      "id": "pay-fuel-bonus-old-b1i1"
     }
    ],
    "id": "pay-fuel-bonus-old-b1"
   },
   {
    "label": "ITSD",
    "kind": "custom",
    "items": [
     {
      "text": "Dashboard → Drivers. Delivery Date + Custom Range = pay period. Confirm dates for ALL drivers.",
      "id": "pay-fuel-bonus-old-b2i1"
     },
     {
      "text": "In Excel, delete everything besides Empty Miles and Driver. Sort by Driver, paste values into the ITSD tab. Text red.",
      "id": "pay-fuel-bonus-old-b2i2"
     }
    ],
    "id": "pay-fuel-bonus-old-b2"
   },
   {
    "label": "Quartix",
    "kind": "custom",
    "items": [
     {
      "text": "Trips → Trip Reporter. Active tractors, All, pay period. Group by vehicle, check all 3 boxes, download CSV (Summary Only).",
      "linkUrl": "https://www.quartix.com/",
      "linkLabel": "Quartix",
      "id": "pay-fuel-bonus-old-b3i1"
     },
     {
      "text": "Keep Vehicle and Total Distance; delete the top row. Put Total Distance behind Vehicle; Text-to-columns Vehicle on spaces — first column is the truck #.",
      "id": "pay-fuel-bonus-old-b3i2"
     },
     {
      "text": "Sort by last name; paste into the Quartix tab. Text blue.",
      "id": "pay-fuel-bonus-old-b3i3"
     }
    ],
    "id": "pay-fuel-bonus-old-b3"
   },
   {
    "label": "Motive",
    "kind": "custom",
    "items": [
     {
      "text": "Reports → Drivers Workload → export CSV (three dots, top right).",
      "linkUrl": "https://gomotive.com/",

  "id": "pay-entering-fuel",

  "type": "standard",
  "title": "Entering Fuel",
  "steps": [
   {
    "text": "Open the fuel report. QuickBooks → Reports → Current pay period.",
    "id": "pay-entering-fuel-s1"
   },
   {
    "text": "Per check, enter total fuel (or total minus cash advance) into the Fuel Expense line.",
    "id": "pay-entering-fuel-s2"
   },
   {
    "text": "If scales, add to the Reimbursements line with the date (e.g., 11/30/23).",
    "id": "pay-entering-fuel-s3"
   },
   {
    "text": "If cash advances, add the advance to the Fuel Card; Cash Advance line.",
    "id": "pay-entering-fuel-s4"
   },
   {
    "text": "Add 10% of the cash advance to the Service/Admin Fee line.",
    "id": "pay-entering-fuel-s5"
   },
   {
    "text": "If the check is negative, put a random income amount to make it positive.",
    "id": "pay-entering-fuel-s6"
   },
   {
    "text": "Accounts if missing: 715835 Fuel Expense; 71878 Reimbursements; 12700 Fuel Card; Cash Advance; 60500 Service/Admin Fee.",
    "id": "pay-entering-fuel-s7"
   }
  ]
 },
 {
  "id": "pay-its-statements",
  "section": "payroll",
  "type": "standard",
  "title": "ITS Statements",
  "steps": [
   {
    "text": "ITS Reports → Driver, Delivery Date, Pay period dates → Origin/Destination, Additional Charges, Line Haul, Driver Pay.",
    "id": "pay-its-statements-s1"
   },
   {
    "text": "Accounting → Driver Pay. Select driver. Run report without changing dates (catches old).",
    "id": "pay-its-statements-s2"
   },
   {
    "text": "Change to pay period if nothing old. Look into any old loads.",
    "id": "pay-its-statements-s3"
   },
   {
    "text": "Completed section of Driver Pay Manager: select a generation date before Unpay (to redo a load’s pay).",
    "id": "pay-its-statements-s4"
   },
   {
    "text": "Look for duplicates; if same two loads, investigate. Select all loads → Generate Report.",
    "id": "pay-its-statements-s5"
   },
   {
    "text": "Compare Driver Pay Report / Load Statement to the driver report Excel.",
    "id": "pay-its-statements-s6"
   },
   {
    "text": "Net Driver Pay: Excel excludes Additional Pay/Deductions (layovers, detention, OR road fees) — add/subtract so it matches the Excel.",
    "id": "pay-its-statements-s7"
   },
   {
    "text": "If a dash next to load # and no note, check split pay per driver on each driver’s tab.",
    "id": "pay-its-statements-s8"
   },
   {
    "text": "Adding pay: enter 60% of the pay for flat rate (no flat rate for non-60/40 like local delivery).",
    "id": "pay-its-statements-s9"
   },
   {
    "text": "Print double-sided, save as driver last name. PDFs to Office Documents > Payroll > [year] Payroll Files.",
    "id": "pay-its-statements-s10"
   }
  ]
 },
 {

  "email": "To: driver email   CC: KJ Haight\nSubject: [Driver Company] Fleet Manager Account for Motive\n\nHello,\n\nHere is your Fleet Manager login for Motive. You do not use this through the driver app. There is a Fleet app on the App Store, or for full features use a web browser at https://gomotive.com/ and click Login.\n\nUsername: [email made]   Password: [password generated]\n\nYou will have access to tools such as Fuel Economy reports, Fault Code reports, etc.\n\nAs the Motor Carrier you must assign any unidentified driving events to the driver, or note why you didn’t. As the driver you must claim any unidentified events or note why you didn’t.\n\nTutorial: https://help.gomotive.com/s/articles/Assigning-Unidentified-Trips?language=en_US\n\nLet me know if you have any questions."

  "id": "em-ultimate-onboarding",
  "section": "email",

  "title": "Ultimate Onboarding",
  "email": "To: driver email   CC: KJ Haight\nSubject: Ultimate Onboarding\n\nHello [Driver],\n\nIf you have not created one, go to the FMCSA Drug & Alcohol Clearinghouse and create a driver account. Instructions attached. https://clearinghouse.fmcsa.dot.gov/\n\nI have conducted a query for you under [driving authority]. Please log in to the Clearinghouse and consent to the query.\n\nI have created a Keep Truckin (now Motive) account for you. This is our ELD. They will have sent you login information. Go to the App/Play Store and search for Motive (formerly Keep Truckin).\n\nWalkthroughs:\nGetting Started, Changing Duty Status, Edit Logs, Connect to Truck, Form & Manner Errors, Inspection Reports (DVIR), Unidentified Trips, and Personal Conveyance — see the KeepTruckin/Motive help articles.\n\nMost commonly forgotten: Trailer # and Shipping Documents. Shipping Documents must be the Bill of Lading or Shipping Manifest Number (the Ultimate trip#/load# doesn’t count).\n\nPre-Trip (DVIR): do this AFTER your Walk-around as On-Duty.\n\nUnidentified Driving Events: place a note explaining why you reject a drive event.\n\nPersonal Conveyance: only when relieved from all work duties. Not to enhance operational readiness or forward a load (no dead-heading to a shipper on PC). PC is for using the tractor as a personal vehicle for non-work purposes. Do not use PC for “COVID Exempt” under Ultimate’s authority — those are routine deliveries.\n\nFMCSA Guidelines: https://www.fmcsa.dot.gov/regulations/hours-service/personal-conveyance\n\nThank you."

<script>
"use strict";
(function(){
  /* ---------- constants ---------- */
  var SECTIONS = [
    {id:"daily",     name:"Daily & Routine",            color:"#2563eb"},
    {id:"checklists",name:"Checklists",                 color:"#7c3aed"},
    {id:"updates",   name:"Driver & Equipment Updates", color:"#0891b2"},
    {id:"onboarding",name:"Driver Onboarding",          color:"#059669"},
    {id:"documents", name:"Documents & Carrier Package",color:"#ca8a04"},
    {id:"permits",   name:"Permits & Accounts",         color:"#dc2626"},
    {id:"taxes",     name:"Taxes",                       color:"#db2777"},
    {id:"audits",    name:"Audits & Compliance",         color:"#4f46e5"},
    {id:"equipment", name:"Equipment Tracking",          color:"#0d9488"},
    {id:"fuel",      name:"Fuel/EFS & Factoring",        color:"#ea580c"},
    {id:"motive",    name:"Motive (ELD)",                color:"#65a30d"},
    {id:"payroll",   name:"Payroll",                     color:"#9333ea"},
    {id:"excel",     name:"Excel Macros",                color:"#475569"},
    {id:"email",     name:"Email Templates",             color:"#be123c"}
  ];
  var SEC_BY_ID = {}; SECTIONS.forEach(function(s){ SEC_BY_ID[s.id]=s; });

  var BLOCK_PRESETS = [
    {kind:"before", label:"Before driver leaves — your tasks"},
    {kind:"norush", label:"No rush — your tasks"},
    {kind:"kj",     label:"KJ does"},
    {kind:"amie",   label:"Amie does"},
    {kind:"custom", label:""}
  ];
  var COVERING_KINDS = {kj:true, amie:true};

  var CHIP_MAP = {
    "sharepoint.com":"SharePoint","gogps.com":"Quartix","gomotive.com":"Motive",
    "fmcsa.dot.gov":"FMCSA","dot.gov":"DOT","login.gov":"Login.gov","efsllc.com":"EFS",
    "comdata.com":"Comdata","oregon.gov":"Oregon","tax.ny.gov":"NY HUT","netlify.app":"Netlify"
  };

  /* ---------- storage ---------- */
  var CFG_KEY="ul_config_v1", STATE_KEY="ul_state_v1";
  function safeParse(k, fallback){ try{ var v=localStorage.getItem(k); return v?JSON.parse(v):fallback; }catch(e){ return fallback; } }

  // config = syncable later (card edits, custom cards, hidden built-ins)
  var config = safeParse(CFG_KEY, null) || {version:1, cardOverrides:{}, customCards:[], hiddenCards:[]};
  config.cardOverrides = config.cardOverrides || {};
  config.customCards = config.customCards || [];
  config.hiddenCards = config.hiddenCards || [];

  // state = device-local (pins, recents, in-progress sessions)
  var state = safeParse(STATE_KEY, null) || {pins:[], recents:[], sessions:[]};
  state.pins = state.pins || []; state.recents = state.recents || []; state.sessions = state.sessions || [];

  var saveTimer=null;
  function scheduleSave(){ if(saveTimer) clearTimeout(saveTimer); saveTimer=setTimeout(flushConfig, 1500); }
  function flushConfig(){ try{ localStorage.setItem(CFG_KEY, JSON.stringify(config)); }catch(e){} saveTimer=null; if(typeof pushRemoteConfig==="function") pushRemoteConfig(); }
  function saveState(){ try{ localStorage.setItem(STATE_KEY, JSON.stringify(state)); }catch(e){} }
  window.addEventListener("beforeunload", flushConfig);

  /* ---------- built-in cards (parsed safely) ---------- */
  var BUILTIN=[], parseError=null, builtinById={};
  try{
    BUILTIN = JSON.parse(document.getElementById("cards-data").textContent);
    if(!Array.isArray(BUILTIN)) throw new Error("card data is not a list");
  }catch(e){ BUILTIN=[]; parseError=e.message; }
  BUILTIN.forEach(function(c){ builtinById[c.id]=c; });

  /* ---------- helpers ---------- */
  function uid(p){ return (p||"x")+"_"+Math.random().toString(36).slice(2,9); }
  function clone(o){ return o==null?o:JSON.parse(JSON.stringify(o)); }
  function el(tag, props){
    var e=document.createElement(tag);
    if(props) for(var k in props){
      var v=props[k];
      if(k==="class") e.className=v;
      else if(k==="text") e.textContent=v;
      else if(k.slice(0,2)==="on" && typeof v==="function") e.addEventListener(k.slice(2).toLowerCase(), v);
      else if(v!=null) e.setAttribute(k, v);
    }
    for(var i=2;i<arguments.length;i++){ var c=arguments[i]; if(c==null)continue;
      if(typeof c==="string"||typeof c==="number") e.appendChild(document.createTextNode(String(c)));
      else if(Array.isArray(c)) c.forEach(function(x){ if(x) e.appendChild(x); });
      else e.appendChild(c);
    }
    return e;
  }
  function deriveChip(url){
    try{
      var h=new URL(url).hostname.replace(/^www\./,"");
      for(var d in CHIP_MAP){ if(h===d || h.length>d.length && h.slice(-(d.length+1))==="."+d) return "↗ "+CHIP_MAP[d]; }
      var parts=h.split("."); var core=parts.length>=2?parts[parts.length-2]:h;
      return "↗ "+core.charAt(0).toUpperCase()+core.slice(1);
    }catch(e){ return "↗ link"; }
  }
  function timeAgo(ts){
    var s=Math.max(1,Math.floor((Date.now()-ts)/1000));
    if(s<60) return s+"s ago";
    var m=Math.floor(s/60); if(m<60) return m+"m ago";
    var h=Math.floor(m/60); if(h<24) return h+"h ago";
    var d=Math.floor(h/24); if(d<7) return d+"d ago";
    return Math.floor(d/7)+"w ago";
  }

  var TOKEN_RE=/\[(DRIVER|AUTH|OLD|NEW|DOT|OLD_AUTH|NEW_AUTH|OLD_DOT|NEW_DOT)\]/g;
  function substitute(text, ctx){
    if(!ctx) return text;
    return String(text).replace(TOKEN_RE, function(m,k){ return ctx[k] ? ctx[k] : m; });
  }

  // Adds only the context that is directly useful for that checklist line.
  // Example: "Get new permits." -> "Get 899 permits under ShortStack."
  // It intentionally does NOT append every driver/truck/authority value to every task.
  function enrichChecklistText(text, ctx, card){
    if(!ctx || !card || card.type!=="driver-event") return text;
    text=String(text||"");
    var l=text.toLowerCase();

    function clean(v){ return String(v||"").trim(); }
    function truck(v){ return clean(v).replace(/^#+\s*/,""); }
    function authName(v){ return clean(v).replace(/,?\s+LLC\.?$/i,"").trim(); }
    function dot(v){ return clean(v).replace(/^#+\s*/,""); }
    function has(words){ for(var i=0;i<words.length;i++){ if(l.indexOf(words[i])>=0) return true; } return false; }
    function cap(s){ return s ? s.charAt(0).toUpperCase()+s.slice(1) : s; }
    function under(a){ a=authName(a); return a ? " under "+a : ""; }
    function forAuth(a){ a=authName(a); return a ? " for "+a : ""; }
    function truckWords(t){ t=truck(t); return t ? "truck "+t : "truck"; }
    function possessive(n){ n=clean(n); return n ? n+(n.slice(-1).toLowerCase()==="s"?"'":"'s") : "Driver's"; }
    function sentence(s){ s=String(s||"").replace(/\s+/g," ").trim(); return /[.!?)]$/.test(s) ? s : s+"."; }
    function permitLine(action, t, a){
      t=truck(t); a=authName(a);
      if(t && a) return sentence(action+" "+t+" permits under "+a);
      if(t) return sentence(action+" "+t+" permits");
      if(a) return sentence(action+" permits under "+a);
      return text;
    }
    function addTransponder(t,a){
      t=truck(t); a=authName(a);
      if(t || a) return sentence("Add "+(t?t+" ":"")+"transponder in OR"+(a?" under "+a:"")+" (non B#)");
      return text;
    }
    function truckDocs(t,a){
      t=truck(t); a=authName(a);
      if(t || a) return sentence("Truck docs for "+(t?"truck "+t:"truck")+(a?" under "+a:"")+". Email & upload to cloud");
      return text;
    }
    function truckPhoto(t){ t=truck(t); return t ? sentence("Take picture of truck "+t) : text; }
    function truckCloud(t,d){
      t=truck(t); d=dot(d);
      if(t || d) return sentence("Check "+(t?"truck "+t+" ":"truck ")+"cloud file has DOT"+(d?" #"+d:"") + ", reg & ID card");
      return text;
    }
    function permitFolders(t,a){
      t=truck(t); a=authName(a);
      if(t || a) return sentence("Update permit folders on cloud"+(t?" for "+t:"")+(a?" under "+a:""));
      return text;
    }
    function permitSheets(t,a,extra){
      t=truck(t); a=authName(a);
      if(t || a) return sentence("Update permit sheets on cloud"+(t?" for "+t:"")+(a?" under "+a:"")+(extra?". "+extra:"") );
      return text;
    }
    function currentTrucks(driver, oldT, newT, a, note){
      var bits=[];
      driver=clean(driver); oldT=truck(oldT); newT=truck(newT); a=authName(a);
      if(driver) bits.push(driver);
      if(oldT && newT) bits.push(oldT+" → "+newT); else if(newT) bits.push(newT); else if(oldT) bits.push(oldT);
      if(a) bits.push(a);
      if(note) bits.push(note);
      return bits.length ? sentence("Update current trucks & drivers sheet: "+bits.join(" · ")) : text;
    }
    function driverAuthSheet(driver, oldA, newA){
      driver=clean(driver); oldA=authName(oldA); newA=authName(newA);
      var line="Update driver authority sheet";
      if(driver) line += ": "+driver;
      if(oldA && newA) line += (driver?" ":": ")+oldA+" → "+newA;
      else if(newA) line += (driver?" — ":": ")+newA;
      else if(oldA) line += (driver?" — ":": ")+oldA;
      return line!=="Update driver authority sheet" ? sentence(line) : text;
    }
    function dotText(d,a){
      d=dot(d); a=authName(a);
      if(d && a) return "DOT #"+d+" ("+a+")";
      if(d) return "DOT #"+d;
      return a;
    }

    var ev=card.eventType;
    var driver=clean(ctx.DRIVER);
    var baseAuth=authName(ctx.AUTH), baseDot=dot(ctx.DOT);
    var oldAuth=authName(ctx.OLD_AUTH), newAuth=authName(ctx.NEW_AUTH);
    var oldDot=dot(ctx.OLD_DOT), newDot=dot(ctx.NEW_DOT);
    var oldTruck=truck(ctx.OLD), newTruck=truck(ctx.NEW), curTruck=newTruck || oldTruck;

    if(ev==="authority-change"){
      if(has(["cancel old permits"])) return permitLine("Cancel", oldTruck || curTruck, oldAuth);
      if(has(["get new permits"])) return permitLine("Get", curTruck, newAuth);
      if(has(["ucr"])) return newAuth ? sentence("UCR for "+newAuth) : text;
      if(has(["permit accounts set-up", "permit accounts setup"])) return newAuth ? sentence("Permit accounts set-up (POAs) for "+newAuth) : text;
      if(has(["add transponder"])) return addTransponder(curTruck, newAuth);
      if(has(["truck docs"])) return truckDocs(curTruck, newAuth);
      if(has(["take picture"])) return truckPhoto(curTruck);
      if(has(["check truck cloud"])) return truckCloud(curTruck, newDot || oldDot);
      if(has(["add auth to"])) return newAuth ? sentence("Add "+newAuth+" to “Ultimate Contractual Carriers”") : text;
      if(has(["new carrier packet"])) return newAuth ? sentence("Email Disp & Office new Carrier Packet for "+newAuth+" (replace ^)") : text;
      if(has(["get new mvr"])) return driver ? sentence("Get new MVR for "+driver) : text;
      if(has(["embark scheduled mvr"])) return driver ? sentence("Update "+possessive(driver)+" embark scheduled MVR date") : text;
      if(has(["carrier package"])){
        if(newAuth && oldAuth) return sentence("Carrier package for "+newAuth+". Upload to cloud; move "+oldAuth+" package to old folder");
        if(newAuth) return sentence("Carrier package for "+newAuth+". Upload to cloud; move old package to old folder");

  /* ---------- card resolution ---------- */
  function isCustom(id){ for(var i=0;i<config.customCards.length;i++) if(config.customCards[i].id===id) return config.customCards[i]; return null; }
  function getEffectiveCard(id){
    var cust=isCustom(id); if(cust) return cust;
    var base=builtinById[id]; if(!base) return null;
    var ov=config.cardOverrides[id];
    if(ov){ var m=clone(base); if(ov.steps) m.steps=ov.steps; if(ov.blocks) m.blocks=ov.blocks; if(ov.title!=null) m.title=ov.title; if(ov.defaultMode) m.defaultMode=ov.defaultMode; if(ov.toggles) m.toggles=ov.toggles; if(ov.lastEdited) m.lastEdited=ov.lastEdited; return m; }
    return base;
  }
  function getOriginalCard(id){
    var cust=isCustom(id); if(cust) return cust._orig || cust;
    return builtinById[id];
  }
  // returns mutable object whose .steps/.blocks can be edited & persisted
  function getMutableCard(id){
    var cust=isCustom(id); if(cust) return cust;
    var base=builtinById[id];
    if(!config.cardOverrides[id]) config.cardOverrides[id]={steps:clone(base.steps||null), blocks:clone(base.blocks||null), title:base.title};
    return config.cardOverrides[id];
  }
  function isEditable(card){ return card.type!=="email"; }

  /* ----- per-card "last edited" tracking (synced via shared config) ----- */
  function cardLastEdited(cardId){
    var cust=isCustom(cardId);
    if(cust) return cust.lastEdited||null;
    var ov=config.cardOverrides[cardId];
    return (ov && ov.lastEdited)||null;
  }
  function touchCard(cardId){
    var cust=isCustom(cardId);
    if(cust){ cust.lastEdited=Date.now(); }
    else { getMutableCard(cardId).lastEdited=Date.now(); }
  }
  function fmtMDY(ts){
    if(!ts) return "n/a";
    var d=new Date(ts); if(isNaN(d.getTime())) return "n/a";
    function p(n){ return (n<10?"0":"")+n; }
    return p(d.getMonth()+1)+"/"+p(d.getDate())+"/"+d.getFullYear();
  }
  function isHidden(id){ return config.hiddenCards.indexOf(id)>=0; }

  function allVisibleCards(){
    var out=[];
    BUILTIN.forEach(function(c){ if(!isHidden(c.id)) out.push(getEffectiveCard(c.id)); });
    config.customCards.forEach(function(c){ out.push(c); });
    return out;
  }

  ==================================================================== */
  var browseQuery="", browseFilter=null, editFilterMode="all", editBeforeDate="";
  function passesEditFilter(card){
    var le=cardLastEdited(card.id);
    if(editFilterMode==="never") return !le;
    if(editFilterMode==="edited") return !!le;
    if(editFilterMode==="before"){
      if(!editBeforeDate) return true;
      var cutoff=new Date(editBeforeDate+"T00:00:00").getTime();
      if(!le) return true;            // never-edited counts as needing review
      return le < cutoff;
    }
    return true;
  }
  function cardMatches(card, q){
    if(!q) return true; q=q.toLowerCase();
    if(card.title.toLowerCase().indexOf(q)>=0) return true;
    if((SEC_BY_ID[card.section]||{}).name && SEC_BY_ID[card.section].name.toLowerCase().indexOf(q)>=0) return true;
    var hit=false;
    (card.steps||[]).forEach(function(s){ if(String(s.text).toLowerCase().indexOf(q)>=0) hit=true; });
    (card.blocks||[]).forEach(function(b){ (b.items||[]).forEach(function(it){ if(String(it.text).toLowerCase().indexOf(q)>=0) hit=true; }); });
    if(card.email && card.email.toLowerCase().indexOf(q)>=0) hit=true;
    return hit;
  }

  function captureContextForm(){
    var v=modalState.formValues;
    [["f-driverpick","driverpick"],["f-driver","driver"],["f-eventdate","eventdate"],["f-auth","auth"],["f-dot","dot"],["f-old","old"],["f-new","new"],
     ["f-oldauth","oldauth"],["f-newauth","newauth"],["f-olddot","olddot"],["f-newdot","newdot"]].forEach(function(p){

  function restoreContextForm(){
    var v=modalState.formValues||{};
    var map={"f-driverpick":"driverpick","f-driver":"driver","f-eventdate":"eventdate","f-auth":"auth","f-dot":"dot","f-old":"old","f-new":"new","f-oldauth":"oldauth","f-newauth":"newauth","f-olddot":"olddot","f-newdot":"newdot"};

      var elx=document.getElementById(id); var val=v[map[id]];

      if(elx.tagName==="SELECT" && val!==""){

        if(!found) elx.appendChild(el("option",{value:val, text:val}));

  function authorityDot(auth){
