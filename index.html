function openBuilder(){
  const sec = document.getElementById('b-section');
  sec.innerHTML = SECTIONS.map(s=>`<option value="${s}">${s}</option>`).join('');
  document.getElementById('b-title').value='';
  document.getElementById('b-steps-list').innerHTML='';
  document.getElementById('b-blocks-list').innerHTML='';
  document.getElementById('builder-overlay').classList.add('open');
}
function closeBuilder(){ document.getElementById('builder-overlay').classList.remove('open'); }
function handleBuilderOverlayClick(e){ if(e.target===document.getElementById('builder-overlay')) closeBuilder(); }

function builderAddStep(){
  const list = document.getElementById('b-steps-list');
  const idx = list.children.length;
  const div = document.createElement('div');
  div.className='builder-step-row';
  div.innerHTML=`<input type="text" placeholder="Step ${idx+1}…"><button class="builder-remove-btn" onclick="this.parentElement.remove()">✕</button>`;
  list.appendChild(div);
}

function builderAddBlock(){
  const list = document.getElementById('b-blocks-list');
  const div = document.createElement('div');
  div.className='builder-block-row';
  div.innerHTML=`<div class="builder-block-label">
    Block type: <select>
      <option>Before driver leaves — your tasks</option>
      <option>No rush — your tasks</option>
      <option>KJ does</option>
      <option>Amie does</option>
      <option value="custom">Custom label</option>
    </select>
    <input type="text" placeholder="Custom label (if Custom)" style="display:none;flex:1">
    <button class="builder-remove-btn" onclick="this.closest('.builder-block-row').remove()">✕</button>
  </div>
  <div class="builder-block-items"><div class="builder-item-row"><input type="text" placeholder="Item 1…"><button class="builder-remove-btn" onclick="this.parentElement.remove()">✕</button></div></div>
  <button class="builder-add-btn" onclick="builderAddBlockItem(this)" style="font-size:11px;padding:5px">+ Add item</button>`;
  const sel = div.querySelector('select');
  sel.addEventListener('change',()=>{
    const customInput = div.querySelector('input[placeholder="Custom label (if Custom)"]');
    customInput.style.display = sel.value==='custom'?'block':'none';
  });
  list.appendChild(div);
}

function builderAddBlockItem(btn){
  const items = btn.previousElementSibling;
  const div = document.createElement('div');
  div.className='builder-item-row';
  div.innerHTML=`<input type="text" placeholder="Item…"><button class="builder-remove-btn" onclick="this.parentElement.remove()">✕</button>`;
  items.appendChild(div);
}

function createCard(){
  const title = document.getElementById('b-title').value.trim();
  const section = document.getElementById('b-section').value;
  if(!title){ showToast("Title is required"); return; }
  const steps = Array.from(document.querySelectorAll('#b-steps-list .builder-step-row input')).map(i=>i.value.trim()).filter(Boolean);
  const blockEls = document.querySelectorAll('#b-blocks-list .builder-block-row');
  const blocks = [];
  blockEls.forEach(el=>{
    const sel = el.querySelector('select');
    let label = sel.value;
    if(label==='custom') label = el.querySelector('input[placeholder="Custom label (if Custom)"]').value.trim()||'Custom';
    const items = Array.from(el.querySelectorAll('.builder-item-row input')).map(i=>({text:i.value.trim()})).filter(x=>x.text);
    if(items.length>0) blocks.push({label, color: SECTION_COLORS[section]||"#888", items});
  });
  const id = 'custom_'+Date.now();
  const newCard = {id, section, title, isCustom:true, ...(steps.length>0?{steps}:{}), ...(blocks.length>0?{blocks}:{})};
  config.customCards.push(newCard);
  allCards.push(newCard);
  scheduleConfigSave();
  closeBuilder();
  renderBrowse();
  showToast("Card created ✓");
  openCard(id);
}

function deleteCustomCard(){
  if(!currentCard || !currentCard.isCustom) return;
  if(!confirm(`Delete "${currentCard.title}"?`)) return;
  config.customCards = config.customCards.filter(c=>c.id!==currentCard.id);
  allCards = allCards.filter(c=>c.id!==currentCard.id);
  scheduleConfigSave();
  closeModal();
  renderBrowse();
  showToast("Card deleted");
}

  const popup = document.getElementById('edit-popup');

});

// ============================================================
// TOAST
// ============================================================
let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

// ============================================================
// UTILS
// ============================================================
function escHtml(s){ const d=document.createElement('div'); d.textContent=String(s||''); return d.innerHTML; }
function timeAgo(ts){
  const diff = Date.now()-ts;
  if(diff<60000) return 'just now';
  if(diff<3600000) return Math.floor(diff/60000)+'m ago';
  if(diff<86400000) return Math.floor(diff/3600000)+'h ago';
  return Math.floor(diff/86400000)+'d ago';
}

  // Build section dropdown for builder
  const sec = document.getElementById('b-section');
  if(sec) sec.innerHTML = SECTIONS.map(s=>`<option value="${s}">${s}</option>`).join('');
});
</script>
</body>
