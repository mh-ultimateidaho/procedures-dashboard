<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Logistics — Procedures Dashboard</title>
<style>
:root {
  --bg: #f5f5f7;
  --surface: #ffffff;
  --surface2: #f0f0f3;
  --border: #e2e2e7;
  --text: #1a1a2e;
  --text2: #5a5a72;
  --text3: #9999aa;
  --accent: #2563eb;
  --accent-light: #eff6ff;
  --red: #dc2626;
  --green: #16a34a;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.12), 0 4px 10px rgba(0,0,0,.08);
  --radius: 10px;
  --radius-sm: 6px;
  /* Section colors */
  --c-daily:     #3b82f6;
  --c-checks:    #8b5cf6;
  --c-driver:    #f59e0b;
  --c-onboard:   #10b981;
  --c-docs:      #6366f1;
  --c-permits:   #0ea5e9;
  --c-taxes:     #ef4444;
  --c-audits:    #dc2626;
  --c-equip:     #f97316;
  --c-fuel:      #eab308;
  --c-motive:    #14b8a6;
  --c-payroll:   #ec4899;
  --c-macros:    #64748b;
  --c-email:     #7c3aed;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
/* HEADER */
#header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}
#header h1 { font-size: 15px; font-weight: 700; letter-spacing: -.01em; white-space: nowrap; }
#header h1 span { color: var(--accent); }
.header-nav { display: flex; gap: 2px; margin-left: 8px; }
.nav-btn {
  background: none; border: none; cursor: pointer;
  padding: 6px 12px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500; color: var(--text2);
  transition: background .15s, color .15s;
}
.nav-btn:hover, .nav-btn.active { background: var(--surface2); color: var(--text); }
.nav-btn.active { color: var(--accent); background: var(--accent-light); }
#header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
#sp-status { font-size: 12px; color: var(--text3); }
#sp-status.signed-in { color: var(--green); }
#signin-btn {
  background: var(--accent); color: #fff; border: none; cursor: pointer;
  padding: 7px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
  display: flex; align-items: center; gap: 6px; transition: opacity .15s;
}
#signin-btn:hover { opacity: .88; }
#signin-btn.hidden { display: none; }
#signout-btn {
  background: none; border: 1px solid var(--border); cursor: pointer;
  padding: 6px 12px; border-radius: var(--radius-sm); font-size: 12px; color: var(--text2);
  display: none;
}
#signout-btn.visible { display: block; }
/* MAIN */
#main { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }
/* HOME VIEW */
.home-section { margin-bottom: 36px; }
.home-section h2 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.home-section h2 button { background: none; border: none; cursor: pointer; font-size: 11px; color: var(--text3); text-transform: none; letter-spacing: 0; padding: 2px 6px; border-radius: 4px; font-weight: 500; }
.home-section h2 button:hover { background: var(--border); color: var(--text2); }
.cards-row { display: flex; flex-wrap: wrap; gap: 12px; }
.empty-state { color: var(--text3); font-size: 13px; padding: 8px 0; }
/* SESSION CARD */
.session-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 16px; width: 240px; cursor: pointer; transition: box-shadow .15s;
  position: relative;
}
.session-card:hover { box-shadow: var(--shadow-md); }
.session-card .sc-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; color: #fff; margin-bottom: 8px; }
.session-card .sc-driver { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.session-card .sc-meta { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
.session-card .sc-progress { height: 4px; background: var(--surface2); border-radius: 2px; margin-bottom: 4px; }
.session-card .sc-progress-fill { height: 100%; border-radius: 2px; background: var(--accent); }
.session-card .sc-progress-label { font-size: 11px; color: var(--text3); margin-bottom: 8px; }
.session-card .sc-time { font-size: 11px; color: var(--text3); }
.session-card .sc-actions { display: flex; gap: 6px; margin-top: 10px; }
.sc-open-btn { flex: 1; background: var(--accent); color: #fff; border: none; cursor: pointer; padding: 6px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500; }
.sc-del-btn { background: none; border: 1px solid var(--border); cursor: pointer; padding: 6px 8px; border-radius: var(--radius-sm); font-size: 12px; color: var(--text2); }
.sc-del-btn:hover { background: #fff0f0; border-color: var(--red); color: var(--red); }
/* PINNED / RECENT CARDS - mini */
.mini-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 11px 14px; cursor: pointer; transition: box-shadow .15s;
  position: relative; display: flex; align-items: center; gap: 10px; min-width: 160px;
}
.mini-card:hover { box-shadow: var(--shadow-md); }
.mini-card .mc-badge { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.mini-card .mc-title { font-size: 13px; font-weight: 500; flex: 1; }
.mini-card .mc-time { font-size: 11px; color: var(--text3); white-space: nowrap; }
.mini-card .pin-btn {
  position: absolute; top: 6px; right: 6px; background: none; border: none; cursor: pointer;
  opacity: 0; font-size: 12px; transition: opacity .15s; padding: 2px;
}
.mini-card:hover .pin-btn { opacity: 1; }
.mini-card.pinned .pin-btn { opacity: .6; }
/* BROWSE VIEW */
#browse-view { display: none; }
#browse-view.active { display: block; }
#home-view.hidden { display: none; }
.browse-toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
#search-input {
  padding: 8px 12px 8px 34px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 13px; background: var(--surface); color: var(--text); width: 240px; outline: none;
  transition: border-color .15s;
}
#search-input:focus { border-color: var(--accent); }
.search-wrap { position: relative; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); pointer-events: none; }
.filter-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.chip {
  padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--surface); font-size: 12px; font-weight: 500; cursor: pointer;
  transition: background .12s, border-color .12s, color .12s; color: var(--text2); white-space: nowrap;
}
.chip:hover { background: var(--surface2); }
.chip.active { color: #fff; border-color: transparent; }
#new-card-btn {
  margin-left: auto; background: var(--accent); color: #fff; border: none; cursor: pointer;
  padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
  display: flex; align-items: center; gap: 6px;
}
#new-card-btn:hover { opacity: .88; }
/* CARD GRID */
.section-group { margin-bottom: 32px; }
.section-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text3); margin-bottom: 12px; padding-left: 2px; }
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
.proc-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 16px; cursor: pointer; transition: box-shadow .15s, transform .1s;
  position: relative;
}
.proc-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.proc-card .pc-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; color: #fff; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .04em; }
.proc-card .pc-title { font-size: 14px; font-weight: 600; line-height: 1.3; }
.proc-card .pc-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
.proc-card .pin-btn { position: absolute; top: 8px; right: 8px; background: none; border: none; cursor: pointer; opacity: 0; font-size: 13px; transition: opacity .15s; }
.proc-card:hover .pin-btn { opacity: .5; }
.proc-card.pinned .pin-btn { opacity: .7; }
/* MODAL */
#modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 200;
  display: flex; align-items: center; justify-content: center; padding: 20px;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
#modal-overlay.open { opacity: 1; pointer-events: all; }
#modal {
  background: var(--surface); border-radius: 14px; width: 100%; max-width: 700px;
  max-height: 90vh; display: flex; flex-direction: column;
  box-shadow: var(--shadow-lg); transform: translateY(8px); transition: transform .2s;
}
#modal-overlay.open #modal { transform: translateY(0); }
#modal-header {
  display: flex; align-items: center; gap: 12px; padding: 18px 20px 16px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
#modal-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: .04em; }
#modal-title { font-size: 18px; font-weight: 700; flex: 1; }
#modal-save-btn {
  background: var(--accent); color: #fff; border: none; cursor: pointer;
  padding: 7px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
  display: none; align-items: center; gap: 6px;
}
#modal-save-btn.visible { display: flex; }
#modal-delete-card-btn {
  background: none; border: 1px solid #fecaca; color: var(--red); cursor: pointer;
  padding: 6px 12px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500;
  display: none;
}
#modal-delete-card-btn.visible { display: block; }
#modal-close-btn {
  background: none; border: none; cursor: pointer; font-size: 20px; color: var(--text3);
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; transition: background .12s;
}
#modal-close-btn:hover { background: var(--surface2); }
#modal-body { overflow-y: auto; padding: 20px; flex: 1; }
/* DRIVER CONTEXT */
.driver-context {
  background: var(--surface2); border-radius: var(--radius); padding: 16px;
  margin-bottom: 20px;
}
.driver-context h4 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); margin-bottom: 12px; }
.ctx-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
.ctx-field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 120px; }
.ctx-field label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .04em; }
.ctx-field select, .ctx-field input {
  padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 13px; background: var(--surface); color: var(--text); outline: none;
  transition: border-color .15s;
}
.ctx-field select:focus, .ctx-field input:focus { border-color: var(--accent); }
.ctx-apply-btn {
  background: var(--accent); color: #fff; border: none; cursor: pointer;
  padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
  margin-top: 8px; transition: opacity .15s;
}
.ctx-apply-btn:hover { opacity: .88; }
.ctx-folder-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.folder-link-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--surface); color: var(--accent); font-size: 12px; font-weight: 500;
  text-decoration: none; transition: background .12s;
}
.folder-link-btn:hover { background: var(--accent-light); }
/* KJ/AMIE DISCLOSURE */
.covering-disclosure { margin-bottom: 16px; }
.covering-toggle {
  background: none; border: none; cursor: pointer; font-size: 13px; font-weight: 600;
  color: var(--text2); display: flex; align-items: center; gap: 6px; padding: 8px 12px;
  border-radius: var(--radius-sm); transition: background .12s; width: 100%;
}
.covering-toggle:hover { background: var(--surface2); }
.covering-content { display: none; }
.covering-content.open { display: block; }
/* STEPS */
.steps-list { list-style: none; counter-reset: step-counter; }
.step-item {
  display: flex; align-items: flex-start; gap: 10px; padding: 8px 0;
  border-bottom: 1px solid var(--border); counter-increment: step-counter;
}
.step-item:last-child { border-bottom: none; }
.step-num {
  flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%;
  background: var(--surface2); font-size: 11px; font-weight: 700; color: var(--text2);
  display: flex; align-items: center; justify-content: center; margin-top: 1px;
}
.step-content { flex: 1; font-size: 14px; line-height: 1.5; }
.step-actions { display: flex; gap: 4px; opacity: .25; transition: opacity .15s; flex-shrink: 0; margin-top: 2px; }
.step-item:hover .step-actions { opacity: 1; }
.edit-btn, .del-btn {
  background: none; border: none; cursor: pointer; padding: 3px 5px;
  border-radius: 4px; font-size: 13px; color: var(--text2); transition: background .12s;
}
.edit-btn:hover { background: var(--surface2); }
.del-btn:hover { background: #fff0f0; color: var(--red); }
.add-step-btn {
  background: none; border: 1px dashed var(--border); width: 100%; padding: 8px;
  border-radius: var(--radius-sm); font-size: 13px; color: var(--text2); cursor: pointer;
  margin-top: 8px; transition: background .12s, border-color .12s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.add-step-btn:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent); }
/* OWNER BLOCKS */
.owner-block { border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
.owner-block-header {
  padding: 8px 14px; font-size: 12px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: #fff;
}
.owner-block-body { padding: 8px 0; }
.owner-item {
  display: flex; align-items: center; gap: 10px; padding: 7px 14px;
  border-bottom: 1px solid rgba(0,0,0,.06); transition: background .1s;
}
.owner-item:last-child { border-bottom: none; }
.owner-item:hover { background: rgba(0,0,0,.02); }
.owner-item input[type=checkbox] { flex-shrink: 0; width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); }
.owner-item .item-text { flex: 1; font-size: 13px; line-height: 1.4; }
.owner-item .item-text.checked { text-decoration: line-through; color: var(--text3); }
.link-chip {
  display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px;
  background: var(--accent-light); color: var(--accent); font-size: 11px; font-weight: 600;
  font-family: 'SF Mono', 'Fira Code', monospace; text-decoration: none; white-space: nowrap;
  margin-left: 6px; transition: background .12s;
}
.link-chip:hover { background: #dbeafe; }
.item-edit-actions { display: flex; gap: 4px; opacity: .2; transition: opacity .15s; }
.owner-item:hover .item-edit-actions { opacity: 1; }
/* EDIT POPUP */
#edit-popup {
  position: fixed; z-index: 300; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow-lg); padding: 14px 16px; width: 300px;
  display: none;
}
#edit-popup.open { display: block; }
#edit-popup h4 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); margin-bottom: 10px; }
#edit-popup textarea, #edit-popup input {
  width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 13px; font-family: inherit; color: var(--text); outline: none;
  transition: border-color .15s; background: var(--surface);
  display: block; margin-bottom: 8px;
}
#edit-popup textarea { resize: vertical; min-height: 70px; }
#edit-popup textarea:focus, #edit-popup input:focus { border-color: var(--accent); }
#edit-popup label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .04em; display: block; margin-bottom: 4px; }
.popup-actions { display: flex; gap: 6px; margin-top: 4px; }
.popup-save { flex: 1; background: var(--accent); color: #fff; border: none; cursor: pointer; padding: 7px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500; }
.popup-reset { background: none; border: 1px solid var(--border); cursor: pointer; padding: 7px 10px; border-radius: var(--radius-sm); font-size: 12px; color: var(--text2); }
.popup-cancel { background: none; border: none; cursor: pointer; padding: 7px 10px; font-size: 12px; color: var(--text2); }
/* NEW CARD BUILDER MODAL */
#builder-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 200;
  display: flex; align-items: center; justify-content: center; padding: 20px;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
#builder-overlay.open { opacity: 1; pointer-events: all; }
#builder-modal {
  background: var(--surface); border-radius: 14px; width: 100%; max-width: 580px;
  max-height: 90vh; display: flex; flex-direction: column;
  box-shadow: var(--shadow-lg);
}
#builder-modal h3 { font-size: 17px; font-weight: 700; padding: 18px 20px 16px; border-bottom: 1px solid var(--border); }
#builder-body { padding: 20px; overflow-y: auto; flex: 1; }
.builder-field { margin-bottom: 14px; }
.builder-field label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--text2); display: block; margin-bottom: 6px; }
.builder-field input, .builder-field select, .builder-field textarea {
  width: 100%; padding: 8px 11px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 13px; font-family: inherit; color: var(--text); outline: none;
  transition: border-color .15s; background: var(--surface);
}
.builder-field input:focus, .builder-field select:focus, .builder-field textarea:focus { border-color: var(--accent); }
.builder-section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); margin: 16px 0 10px; padding-top: 16px; border-top: 1px solid var(--border); }
.builder-step-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
.builder-step-row input { flex: 1; }
.builder-remove-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 16px; padding: 4px; }
.builder-remove-btn:hover { color: var(--red); }
.builder-add-btn {
  background: none; border: 1px dashed var(--border); width: 100%; padding: 7px;
  border-radius: var(--radius-sm); font-size: 12px; color: var(--text2); cursor: pointer;
  margin-top: 4px;
}
.builder-add-btn:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent); }
.builder-block-row { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 8px; }
.builder-block-label { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.builder-block-label select { flex: 1; padding: 4px 8px; font-size: 12px; border: 1px solid var(--border); border-radius: 4px; background: var(--surface); }
.builder-block-items { }
.builder-item-row { display: flex; gap: 6px; margin-bottom: 4px; align-items: center; }
.builder-item-row input { flex: 1; font-size: 12px; padding: 5px 8px; }
.builder-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
.builder-create-btn { background: var(--accent); color: #fff; border: none; cursor: pointer; padding: 8px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; }
.builder-cancel-btn { background: none; border: 1px solid var(--border); cursor: pointer; padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; color: var(--text2); }
/* TOAST */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px);
  background: #1a1a2e; color: #fff; padding: 10px 18px; border-radius: 20px;
  font-size: 13px; font-weight: 500; z-index: 400; transition: transform .25s;
  pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }
@media (max-width: 600px) {
  #main { padding: 16px; }
  .card-grid { grid-template-columns: 1fr 1fr; }
  #modal { max-height: 95vh; }
  .session-card { width: 100%; }
}
</style>
</head>
<body>

<div id="header">
  <h1>Ultimate <span>Logistics</span></h1>
  <nav class="header-nav">
    <button class="nav-btn active" id="nav-home" onclick="showView('home')">Home</button>
    <button class="nav-btn" id="nav-browse" onclick="showView('browse')">All Procedures</button>
  </nav>
  <div id="header-right">
    <span id="sp-status">Not signed in</span>
    <button id="signin-btn" onclick="signIn()">🔐 Sign in to SharePoint</button>
    <button id="signout-btn" onclick="signOut()">Sign out</button>
  </div>
</div>

<div id="main">
  <!-- HOME VIEW -->
  <div id="home-view">
    <div class="home-section">
      <h2>📋 In Progress</h2>
      <div class="cards-row" id="in-progress-list"></div>
    </div>
    <div class="home-section">
      <h2>📌 Pinned</h2>

function chipLabel(url){

  try {
    const h = new URL(url).hostname.replace(/^www\./,"");
    if(h.includes("sharepoint.com")||h.includes("ultimatecorp")) return "↗ SharePoint";

    if(h.includes("mvrcheck.com")) return "↗ MVRcheck";
    if(h.includes("bluelinebackgrounds.com")) return "↗ Blueline";

  "Go to My Dashboard → Users. Invite the Amie Gmail account and the Majkaela assistant account.",
  "Log in to both DACH accounts in a different browser to accept the invite.",
  "Go to My Employer Profile to accept the invite, then be upgraded.",
  "Select Ultimate Innovations (admin) from dropdown → Employers → Accept request from driver's authority.",
  "On the driver's authority account, upgrade both users to admin.",
  "Update the DACH sheet — change driver's authority to green and fill in the boxes."
]},
{id:"dach-query",section:"Driver Onboarding",title:"Run Query on DACH",steps:[
  "Log into the Amie Gmail or Majkaela assistant DACH account. On the dropdown at top, choose the driver's authority.",
  "Under Query Overview, click Purchase a Query Plan (it'll be 1).",
  "Select Debit/Credit Card, fill out the information. Check authorization box and continue.",
  "Click Conduct a Query. Fill out the driver's info. Once confirmed, click Next.",
  "Choose the full query, check the box, click Next.",
  "The driver must consent: in their account, go to Driver on the dropdown and click I consent.",
  "Return to your account and view the query. If anything other than 'Result: Driver Not Prohibited' with a green check appears, let Kage or Amie know.",
  "Enter the query amount ($1.25) into QuickBooks."
]},
{id:"motive-logs-dot",section:"Driver Onboarding",title:"Motive — Change Logs to New DOT",steps:[
  "Go to Admin → Compliance, click Edit Company, edit DOT numbers, enter DOT into empty slot, click Save (top right).",
  "Contact KeepTrucking and ask to approve (refer to the standard email — see Email Templates).",
  "Go to Admin → Compliance, scroll until you see the carrier's DOT showing Active (not Pending).",
  "Once driver has officially changed authorities: Drivers → select driver → Options → Edit Account → DOT Authority → select the authority's DOT. Save.",
  "If driver is leaving the same day: Compliance → Logs, filter by Driver, click today's log. Have driver sign if they haven't, then click Edit. Update DOT information to new authority and Save.",
  "On the driver and vehicle tab: Options → Edit Groups → uncheck Not Carrier Managed.",
  "Admin → Groups → Add Group, name it the authority's name. Manage Group → Add Driver. Vehicle tab → add vehicles.",
  "Fleet Users: fill out name and email ([authority name]@ultimateidaho.net), generate credentials.",
  "Send driver the Fleet Manager Account for Motive email (see Email Templates) with username and password.",
  "Drivers → select driver → Options → Edit Groups → uncheck Not Carrier Managed (if not already)."
]},
{id:"ky-account",section:"Driver Onboarding",title:"Creating the Kentucky Account",steps:[
  "On the KY login screen, click Create An Account.",
  "Fill out the info using the KY password sheet. After clicking Sign Up, the driver checks their email for a KOG message — they only click the link and back out.",
  "Click Sign In. Sign in with driver's email and password.",
  "Choose Motor Carrier. Enter EIN (choose FEIN in dropdown) and USDOT.",
  "Fill in: Business Type: Sole Proprietor (enter driver name). Relationship: Owner. Click Finish.",
  "On the company home page, get the permit — only if the light on the right is yellow or green. If red, you need UCR first and must come back.",
  "Go to What Can I Do? → KYU Online – Manage or Apply for KYU License.",
  "Yes, trucks are plated for more than 59,999 (80,000). Apply for a permanent permit.",
  "Enter EIN, select FEIN. Add driver name, remove last four digits of zip. Verify and continue.",
  "Click Add Vehicle and continue. When done click Continue (not Save and Exit). Verify info.",
  "Copy the KYU# into the KY password sheet. Print the KYU letter for the file."
]},
{id:"nm-account",section:"Driver Onboarding",title:"Creating the New Mexico Account",steps:[
  "Click Create a Logon. Click Commercial Vehicle Carrier.",
  "Entity Type: Ltd. Liability Company (LLC). Legal Name is the authority (not driver's name). Leave DBA blank.",
  "No, not signing up on behalf of another taxpayer. No separate mailing address.",
  "Add corporate officer: From = driver hire date, To = 1/1/2030, Type = Owner 100%, ID Type = Driver SSN.",
  "Use driver info for name, email, phone, address.",
  "On next screen choose Weight Distance (Permit & Tax). Not a one-way hauler — just enter the DOT.",
  "Email is driver's email (Use Email: Yes). Password is UltimateLog@4663. Login is driver email.",
  "Don't attach anything. On the homepage, scroll to Lookup Weight Distance Number and enter EIN and DOT.",
  "Copy WDT# into the NM password sheet and write it into the NM POA (NM ID, top right). Scan the POA to attach.",
  "Log in to UltInnovations (parent account). More… → Add Access to Another Account.",
  "Account Type: Weight Distance (Permit & Tax). Continue. Attach Completed Form ACD-31102. The account is now set up."
]},
{id:"greenlight-prepass",section:"Driver Onboarding",title:"Greenlight (PrePass)",steps:[
  "Log in to PrePass. Also open Current Trucks & Drivers sheet (Scale/Toll Transponders tab) and OR Account #'s and passwords sheet (PrePass tab).",
  "Copy/paste the OLD authority's PrePass# into the PrePass search bar. (If truck is NOT yet assigned to anything, skip removing it.)",
  "Select the old truck → Equipment Management. Click Unassign Transponder → Return to Customer Inventory. If not the last truck on account, check 'delete the source equipment'. Click Save, then Cancel on next page, Save again.",
  "Go back to My PrePass. Paste the NEW authority's PrePass# into the search bar.",
  "Equipment Management → Add Equipment. Travel type: Interstate. Check IFTA and IRP boxes.",
  "Continue. Add equipment ID and VIN#. Verify the info pulled (plate #, etc.).",
  "Click Jurisdiction States — should be filled out already. If not, select all EXCEPT AK, HI, PR, NF, NT, PQ, YT. For Canada: check checkbox, put 36287 in dropdown.",
  "Need a transponder: No (unless ordering new — click Yes and select Amie's address). Equipment hauls hazmat: No.",
  "Search for transponder by ID. Enter transponder ID, select, OK on Device Transfer Warning, Save. Complete equipment submission. Done.",
  "Update Current Trucks & Drivers sheet: cut/paste transponder# from old to new truck. Add note 'updated MM/DD/YY'. Confirm authority on new truck is correct."
]},
{id:"bestpass-white",section:"Driver Onboarding",title:"Best Pass — White Bar",blocks:[
  {label:"Best Pass",color:"#10b981",items:[
    {text:"Take a picture of the white bar and send to Amie to edit the Current Trucks & Drivers sheet."},
    {text:"In Best Pass: Vehicles & Devices → select the truck. Look up device number in Quick Assign search bar (# under barcode on right)."},
    {text:"Pop-up asks to replace all transponders — double-check the #s match the bar and accept."},
    {text:"Double-check your changes saved."}
  ]},
  {label:"PrePass",color:"#3b82f6",items:[
    {text:"Go to PrePass and select the authority the truck is under."},
    {text:"Equipment Management → select the truck. Unassign Transponder, mark Return to Customer Inventory."},
    {text:"Assign the new transponder using the PrePass# on the white bar. Save."}
  ]},
  {label:"PrePass (Oregon)",color:"#0ea5e9",items:[
    {text:"Log in to your Oregon account. Transponder → Manage/Review Transponders."},
    {text:"Search to show all trucks. Click Add, type in the transponder#."},
    {text:"Enter usual info: Amie Butler, Account Service Manager, etc. Save."}
  ]}
]},
{id:"bestpass-sticker",section:"Driver Onboarding",title:"Best Pass — Sticker & Blue Module",steps:[
  "BestPass → Vehicles & Devices → Edit Vehicle.",
  "Enter the BestPass# (BP Horizon) into the Quick Assign Device.",
  "It will say the transponder comes as a pair (white box) and will remove old transponder IDs. Click Yes.",
  "Update Current Trucks & Drivers sheet: cut/paste transponder# from old to new truck. Add note 'updated MM/DD/YY'. Confirm authority on new truck is correct."
]},
{id:"driver-pkg-new",section:"Driver Onboarding",title:"Driver Packages — New Driver",blocks:[
  {label:"Paper parts",color:"#10b981",items:[
    {text:"60/40 package — 1-pg lease with Temp Authority (need all info — ask Bill or wait for Kathryn emails)."},
    {text:"Two Page Lease — between Ultimate Logistics and driver's LLC."},
    {text:"Idaho LLC Operating Agreement — for the bank, along with LLC and IRS letter from Kathryn. Change D&A policy date to current date."},
    {text:"Blank insurance cancellation request — driver signs as named insured. Do NOT date."},
    {text:"Safety Responsibility Statement for temp authority."},
    {text:"Truck Docs (see Truck Docs card)."}
  ]},
  {label:"Non-paper parts",color:"#6366f1",items:[
    {text:"Order PSP: MVRcheck.com → Order → New Order → PSP Crash and Inspection History → QuickApp. Input Last, First, email. Send.",url:"https://www.mvrcheck.com"},
    {text:"Order background check: bluelinebackgrounds.com → Order → New Order → Blueline National Plus → QuickApp. Input Last, First, email. Send. If they find records in a county, always say yes to run them.",url:"https://www.bluelinebackgrounds.com"},
    {text:"Update Current Trucks & Drivers.xlsx."},
    {text:"Add driver to ITS: Admin → Drivers → Add. Copy from 60/40 package. Notes box: Temp Authority [auth] and CDL State. Pay tab: set Pay Type to %, change Standard/FSC to 60%, Additional Charges to 0%."},
    {text:"Add driver to KT: Admin → Drivers → Add Driver. Fill name, email, phone, CDL, username. Select Electronic Logs Required & Compliance Mode ELD. Home Terminal Time: Mountain. Check Yard Move and Personal Conveyance (NOT Manual Drive). Select DOT# for Temp Authority. Cycle: 70HR USA, 34hr reset, 30min break."},
    {text:"Run Full Pre-employment Query on DACH under Temporary Authority (see Run Query on DACH)."},
    {text:"Email driver (cc Kage) the Ultimate Onboarding email ONLY AFTER running the query (see Email Templates)."},
    {text:"Add driver to Payroll Line Items Google sheet."}
  ]}
]},
{id:"dot-authority",section:"Driver Onboarding",title:"DOT Authority",steps:[
  "Apply for the DOT/authority.",
  "Request the PIN the day after applying (won't work same day).",
  "Get insurance quotes.",
  "Once DOT is authorized (when Kathryn sends the 'Congratulations' email): create portal account and Clearinghouse account (see those cards).",
  "Update MCS-150 (only if changes needed) the day AFTER the portal is created (won't work same day)."
]},
{id:"driver-books",section:"Driver Onboarding",title:"Driver Books",steps:[
  "Grab a binder (or more), 16 Driver Daily Logs (red and cream sheets with 2nd page), clear sheet protectors, and trippaks.",
  "Print the most recent Driver Book file double-sided.",
  "Also grab the 2 Motive ELD sheets (a Bluetooth instructions card and a Motive instructions booklet). Print double-sided booklet.",
  "Put trippaks in the right pocket of the binder. Put Motive sheets in the left pocket.",
  "Put each page of the driver book into a clear sheet protector.",
  "Place driver daily logs inside the binder, followed by the driver book (book on top)."
]},

// ---- DOCUMENTS & CARRIER PACKAGE ----
{id:"carrier-package",section:"Documents & Carrier Package",title:"Carrier Package",steps:[
  "Pages to include (in this order): Cover page (remove EIN#), Registration, Lease Agreement (redact: total equipment cost, number of months, all dollar amounts including early termination fee — total of 10 redactions), Designation of Payment (use lease sign date if no date), ID Card, Authorization to Drive (redact CDL# and state), Trailer Lease, Picture of truck with graphics.",
  "Name the file [truck#] First Last (e.g., 781 Tim Ruman).",
  "Upload to the driver's 01 Operational folder: Driver Documents > [Last, First] > 01 Operational.",
  "Move the previous carrier package (if any) to the Old subfolder."
]},
{id:"truck-docs",section:"Documents & Carrier Package",title:"Truck Docs",steps:[
  "Start with the new cover sheet for the truck. Open in a web browser for copy/paste, and in PDFsam to start adding pages.",
  "Go to Equipment > Tractors > [truck#] and download the most recent registration. Edit carrier name (Arial, font 9, bold) and US-DOT# (Arial, font 9).",
  "Add the insurance card (may come later — can skip and add).",
  "Add the certificate of liability insurance file.",
  "Add Equipment Lease Agreement, Authorization to Drive Tractor, and Trailer Lease–Interchange Agreement (all signed by Bill).",
  "Get new OR, NM, and KY permits (cancel old permits for the truck). Add to truck docs. Enter NM permit receipt into QuickBooks.",
  "Add the Idaho State Tax Commission file (IFTA License).",
  "Add the truck DOT. Add the Carrier Package.",
  "Send to Amie and Kathryn. Copy Carol if a new 2-pg lease is involved.",
  "Add to payroll line items as TRK PMT in the invoice column.",
  "Fill in the Driver To Do spreadsheet and check off what's done."
]},
{id:"its-new-equip",section:"Documents & Carrier Package",title:"ITS — New Equipment",steps:[
  "Enter Unit#.",
  "Truck type is make and model (e.g., Kenworth T680).",
  "Enter License Plate.",
  "Enter Inspection Expiration date (also add DOT to files).",
  "In Internal Notes, put the truck color.",
  "On the IFTA Form page: enter Year, Fuel Type (diesel), Start Date (purchase date), Registered State (ID), and VIN.",
  "Make a folder for the file room.",
  "Add unit# to the WEX info pool.",
  "Add unit# to Blue Beacon."
]},

// ---- PERMITS & ACCOUNTS ----
{id:"oregon-permits",section:"Permits & Accounts",title:"Oregon DOT — Phone-in Permits",steps:[
  "Print the truck docs cover page to have all truck information handy.",
  "Call 1-503-378-6699.",
  "Request to enroll a vehicle in the tax program.",
  "Other info you may need: OR account# (e.g., 284179), Weight: 80,000 (refrigerated goods), Leased under Ultimate Logistics, Amie Butler is Power of Attorney, your name and title (Administrative Assistant).",
  "For temp permits: provide the route the truck will travel in OR.",
  "Confirm: Yes, OR is on the cab card — apportioned for 80,000 lbs under the Ultimate Logistics IRP account.",
  "For temps, add the amount to QuickBooks (has a 2.4% fee)."
]},

// ---- TAXES ----
{id:"oregon-tax",section:"Taxes",title:"Oregon (Monthly)",steps:[
  "In Quartix: Trips → IFTA Mileage. Enter the first truck on the list plus the date range. Click View IFTA Mileage, copy OR miles into the Oregon Permit sheet. Repeat for each truck.",
  "Log in using the OR Passwords and Accounts# sheet.",
  "Go to Weight-Mile Tax Reports → Weight-Mile Tax Reports (Monthly, Quarterly, and Flat Fee Reports). Create a New Report, monthly tax, choose tax month, then whether there were miles or not.",
  "If no miles: enter info on the next page and move to step 5. If yes miles: enter miles on the right truck, enter info as it asks, select Print-Only, move to step 5.",
  "At the end, click Get this Report and save the file as the authority's name. Save to the corresponding folder.",
  "Once all authorities are filed, triple-check you really filed them all.",
  "Print all the mile returns (don't print 0s).",
  "Enter into QuickBooks as checks with a max of 14."
],links:[{url:"https://www.gogps.com",label:"↗ Quartix"}]},
{id:"nm-tax",section:"Taxes",title:"New Mexico (Quarterly)",steps:[
  "In Quartix: Trips → IFTA Mileage. Enter the first truck on the list with the date range. Click View IFTA Mileage, copy NM miles into the New Mexico Permit sheet. Repeat for each truck. When done, box authorities with multiple trucks and add up the miles — use the total when filing.",
  "Log into the New Mexico website and select the first authority.",
  "Go to File Now, continue until the mileage page.",
  "Add/Edit NM Mileage → Add Weight Class, 80k, and add the miles. Submit.",
  "Save the return, select Make a Payment, pay with credit card, enter payment info.",
  "Move to the next authority. Only do 10 a day or the card will get declined.",
  "Enter each authority into QuickBooks separately, attaching the receipt."
],links:[{url:"https://www.gogps.com",label:"↗ Quartix"}]},
{id:"ky-tax",section:"Taxes",title:"Kentucky (Quarterly)",steps:[
  "In Quartix: Trips → IFTA Mileage. Enter the first truck with the date range. Click View IFTA Mileage, copy KY miles into the Kentucky Permit sheet. Repeat. When done, box authorities with multiple trucks and total their miles.",
  "Go to the Kentucky portal and log in to the first authority.",
  "What Can I Do? → KYU Taxes File.",
  "Continue until the tax quarter screen, select current quarter, continue.",
  "Enter total miles for the authority and continue.",
  "Do NOT cease ops unless told to.",
  "At the end, Print Return and save as PDF under the authority's name.",
  "If there were miles, print the voucher.",
  "Once done, enter vouchers into QuickBooks just like OR (but under Kentucky vendor).",
  "Combine all returns into one PDF and attach it to the first KY check."
],links:[{url:"https://www.gogps.com",label:"↗ Quartix"}]},

// ---- AUDITS & COMPLIANCE ----
{id:"audits",section:"Audits & Compliance",title:"Audits",steps:[
  "Open the sample audit in a separate tab. Download everything from the authority audit folder you're working on.",
  "From the driver's folder (02 Compliance and 03 Confidential), download their MVR, CDL, and Medical.",
  "Download the driver's Fuel Report for the first 30 days of the audit month.",
  "Open the truck docs in PDFsam. Delete/add files until it matches the sample. Double-check the DOT is current.",
  "Edit the Cover Page template in Word to match the authority/driver. Start date = D&A result date (unless noted). Don't forget to change unit# and fuel report dates.",
  "Export the Word file to PDF and add it to the front of your audit file.",
  "Send the driver's logs to the DOT (see Motive — Sending Logs).",
  "Save, rename, and send to Amie."
]},
{id:"sms-tracker",section:"Audits & Compliance",title:"SMS Tracker",steps:[
  "Go to the FMCSA portal — https://portal.fmcsa.dot.gov/login. Log in to the authority. Confirm it's still active; move inactive authorities to the inactive sheet.",
  "If access is denied: click Forgot Password, re-enter login name (email), use security question answers (city: red wing, pet: madison, car: corvair). Change security questions after under Account Management → My Profile → View/Change Security Questions.",
  "In the upper-left Available FMCSA Systems frame, highlight AI (SMS) and click GO.",
  "On the left, click See your Data.",
  "Scroll to Violation Summary and Inspection History.",
  "On the SMS Tracker Excel: update most recent exam date and add any new violations to the violation page (highlighted yellow).",
  "Check whether we received any of the new violations.",
  "Email Kathryn, KJ, and Amie any violations we're missing."
]},
{id:"mcs-150",section:"Audits & Compliance",title:"MCS-150 Updates",steps:[
  "Log in to the carrier's FMCSA portal.",
  "Registration → Biennial Update (MCS-150). Click Continue.",
  "Select Interstate Carrier Only. No hazmat needed.",
  "Verify all info on the next page. Phone numbers CANNOT have dashes or spaces — only numbers.",
  "Driver should be listed as owner. Bill may be listed as an officer — that's okay.",
  "Mileage (MCS 150): last year's mileage. If carrier was not active last year, put 1 mile.",
  "Operation Classification: AUTHORIZED FOR HIRE.",
  "Cargo Classification: GENERAL FREIGHT, FRESH PRODUCE, MEAT, REFRIGERATED FOOD, BEVERAGES, PAPER PRODUCTS.",
  "Number of Vehicles operated in the U.S.: Always TERM LEASED.",
  "Drivers Subject to FMCSR: Always Interstate Beyond 100-Mile Radius. Also enter total.",
  "On the final page, click the blue GO button to save the MCS-150.",
  "Email to Amie, cc Kathryn. Amie will print for file."
]},
{id:"dach-yearly",section:"Audits & Compliance",title:"FMCSA DACH — Yearly Driver Queries",steps:[
  "Go to the DACH google sheet and make a copy. Start with those due soonest.",
  "In D&A Clearinghouse, use the dropdown to go to the first authority.",
  "Under Query Overview, click Purchase a Query Plan. Select how many drivers are under the authority.",
  "Select Debit/Credit Card, fill out the next screen. Check the authorization box and continue.",
  "Click Conduct a Query. Fill out driver info (get from ITS). Click Next.",
  "Choose the limited query, check the box, click Next. Click Conduct Query.",
  "If anything other than 'Result: Driver Not Prohibited' with green check appears, let Kage or Amie know.",
  "Go to the DACH query list, highlight the authority, and put today's date.",
  "For QuickBooks: enter one entry per transaction (even if multiple drivers under one authority = still 1 entry, just change the price).",
  "When completely finished, copy the entire query list sheet into the original DACH google sheet."
]},

// ---- EQUIPMENT TRACKING ----
{id:"quartix-check",section:"Equipment Tracking",title:"Quartix Check",steps:[
  "Go to Equipment > Quartix > Quartix Check Template and add a new sheet.",
  "Go into Quartix → Live Tracking. Group: All, Vehicle: All. Copy/paste the entire text of data into the Quartix sheet (Ctrl+Shift+V, no formatting).",
  "Clean up: delete everything besides the description (has driver name), unit number, and date/time/location column.",
  "Select the date/time/location column. Use Find and Replace: replace 'on' with '+' and 'since' with '+' (trigger words at start of each entry).",
  "Text to Columns, split on '+'. Double-check any rows that didn't format correctly.",
  "Sort by date/time. Delete any from the past couple of days — those are likely fine.",
  "With remaining ones, compare data to ITS to see if the equipment has had loads since the last Quartix reading. If yes, truck is moving — delete that row. If no, the Quartix may be broken.",
  "Highlight any new broken ones in red and email the Excel to Kathryn, Amie, and Brett.",
  "Email the driver and dispatcher to let them know the Quartix needs to be looked at."
],links:[{url:"https://www.gogps.com",label:"↗ Quartix"}]},
{id:"quartix-update",section:"Equipment Tracking",title:"Quartix Change/Update",steps:[
  "Log in to Quartix under the admin account. Configure → Vehicles.",
  "Edit OLD Quartix: Copy Quartix# from Description to Registration# (keep in Description too). Change Description to 'Not Working [qtx#]'. Move out of all groups. Delete the initials (truck number). Save.",
  "Edit NEW Quartix (probably under 'Shipped Unit'): Move the Quartix# to Description. Add driver's name (e.g., Bob Jamison 65489). Change Registration# to the truck# (e.g., ULT 699). Time zone: Mountain. Move to Dispatcher group, All, and Active group. Change icon to black van. Make initials the truck# (without ULT). Save.",
  "Update the Current Quartix sheet AND the Master Quartix list. Do not delete or replace anything — use commas for notes and add lines for new trucks."
],links:[{url:"https://www.gogps.com",label:"↗ Quartix"}]},

// ---- FUEL/EFS & FACTORING ----
{id:"fuel-cards",section:"Fuel/EFS & Factoring",title:"Fuel Cards",steps:[
  "Go to the EFS website and log in. Program → Manage Cards → View/Update Cards.",
  "Look up card by last 8 digits or driver name.",
  "Old card first: select Inactive under Card Status. Write down driver ID (or pin#, 4 digits). Save and go back.",
  "New card: select Active under Card Status. Click Reset PIN. Edit Driver ID — Validation: Exact Match, enter driver's ID. Edit Driver Name — Validation: Report Only, enter driver's name (Last First). Save.",
  "Fill out the Ultimate Fuel Card page for the carrier file.",
  "If driver is locked out (too many login attempts and resetting pin isn't working): Get full card#, log in to WEX looking at the card. Call WEX: 888-824-7378. Press 2 for Carrier. Carrier ID: 5726272#. Call-in ID: 0007#. Call-in PIN: 8079#. Press 6 for online support. Tell them driver got locked out and you need to unsuspend. Company: Ultimate Logistics. Name: Majkaela Holt. Email: efsfuel@ultimateidaho.net. Reset PIN on WEX. Tell driver to use last 4 of card# for PIN."
]},
{id:"efs-codes",section:"Fuel/EFS & Factoring",title:"EFS Codes",steps:[
  "In EFS, go to EFS Codes Report. Select the date range (the day before; include Friday–Sunday if it's Monday).",
  "View Format Type: Excel. Submit. Download and open, enable editing.",
  "Fix any spelling errors in the Notes column.",
  "Developer → Macros, run the EFSCodes macro.",
  "The first tab gets pasted into the EFS Money Codes sheet. Use Ctrl+Shift+V to not mess with formatting.",
  "The second tab (Sorted Data) gets emailed to the Office Team and Dispatchers. When pasting into email, do normal Ctrl+V, then click the (Ctrl) popup and select Keep Source Formatting.",
  "To print truck repair codes for Bill: delete all rows except truck repair EFS codes. Remove borders. Select the data. File → Print: Print Selection, Portrait orientation, Normal margins, Page Setup scaling 150%. Print, fold in half, give to Bill."
]},
{id:"factoring",section:"Fuel/EFS & Factoring",title:"Factoring",blocks:[
  {label:"Transflo",color:"#eab308",items:[
    {text:"Go to Transflo website and log in. Choose date range (usually today, sometimes also yesterday) and search."},
    {text:"Click on the Confirmation Number. Choose View as PDF. Using the trippak cover or BOL, find the load in ITS."},
    {text:"Mark load as Unloading. Go into the load. Attach the Transflo, mark as Completed, save, exit."},
    {text:"If Transflo has a lumper: add to Other Charges, email dispatcher for a revised rate confirmation (attach Transflo), add to the Factoring google sheet Amie sends you. Attach revised when received and delete from working sheet."}
  ]},
  {label:"Ratecons",color:"#eab308",items:[
    {text:"Open a yellow N/A load and go to its files. Download the ratecon."},
    {text:"Confirm it matches the customer on the load. Click pencil next to W/O and input driver's name under ULI."},
    {text:"Exit and fill out: W/O, Shipper, Consignee, both Dates. Click calculator at bottom to configure miles."},
    {text:"Mark load as Open, save, exit."}
  ]},
  {label:"Invoicing Loads",color:"#eab308",items:[
    {text:"In ITS, start on the Delivered/Completed Loads tab. Open Accounting Manager: Accounting → Accounting Manager at top."},
    {text:"Completed tab — check the box to the left of a load (skip any waiting for a revised ratecon) and click Invoice (top right)."},
    {text:"Exit Accounting Manager and open the load you invoiced. Files → download the Transflo (BOLs) and the ratecon."},
    {text:"In PDFsam, open the Invoice, insert BOLs next, insert ratecon last. Triple-check everything matches (ITS, ratecon, Transflo BOLs all match)."},
    {text:"Save the file as Broker#loadnumber_FFG and attach to the load's files."},
    {text:"Open the Broker's info (click i by broker name). On the Advanced tab there should be an EMAIL TO or ORIGINALS REQUIRED."},
    {text:"Send finished invoice to that email with subject: Load #[W/O]. If OG required, don't email (unless email also listed)."},
    {text:"In the load's notes, put Emailed M/D/Y MH. Enter load info into the Factoring sheet."}
  ]}
]},

// ---- MOTIVE (ELD) ----
{id:"motive-codes",section:"Motive (ELD)",title:"Pulling Codes for Trucks",steps:[
  "Go to Reports → Fault Codes.",
  "Enter the vehicle in Select Vehicle.",
  "Options → Export to PDF (top right).",
  "The report will be emailed to you."
],links:[{url:"https://gomotive.com",label:"↗ Motive"}]},
{id:"motive-logs",section:"Motive (ELD)",title:"Sending Logs (for Audits)",steps:[
  "Go to Compliance → Send Output File (top right).",
  "Click Drivers, select the driver the audit is for.",
  "Select the date range (first 30 days — if 31 days, skip the last day).",
  "Add the NEWS-###### pin from FMCSA into the comment box.",
  "Go to https://ai.fmcsa.dot.gov/newentrant/Home.aspx. Log in under 'Received an Offsite Safety Audit letter?'",
  "Go to Upload Here on the right. Copy the NEWS-###### pin. Send. You should get an email confirming it was sent to the DOT."

// ============================================================
// MSAL AUTH (dynamically loaded)
// ============================================================
function loadMsal(){
  return new Promise((resolve)=>{
    const s = document.createElement('script');
    s.src = "https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js";
    s.onload = ()=> resolve(true);
    s.onerror = ()=> resolve(false);
    document.head.appendChild(s);
  });
}

async function initMsal(){
  const loaded = await loadMsal();
  if(!loaded){ console.warn("MSAL failed to load — running without SharePoint"); return; }
  try {
    const msalConfig = {
      auth: { clientId: CLIENT_ID, authority: `https://login.microsoftonline.com/${TENANT_ID}`, redirectUri: REDIRECT_URI },
      cache: { cacheLocation:"localStorage", storeAuthStateInCookie:true }
    };
    msalInstance = new msal.PublicClientApplication(msalConfig);
    await msalInstance.initialize();
    // Handle redirect
    const resp = await msalInstance.handleRedirectPromise();
    if(resp){ msalAccount = resp.account; }
    else {
      const accounts = msalInstance.getAllAccounts();
      if(accounts.length > 0) msalAccount = accounts[0];
    }
    if(msalAccount){ onSignedIn(); }
    else { document.getElementById('signin-btn').classList.remove('hidden'); }
  } catch(e){ console.warn("MSAL init error", e); document.getElementById('signin-btn').classList.remove('hidden'); }
}

async function getToken(){
  if(!msalInstance || !msalAccount) return null;
  try {
    const result = await msalInstance.acquireTokenSilent({
      scopes:["Files.Read","Files.ReadWrite","Sites.Read.All"],
      account: msalAccount
    });
    return result.accessToken;
  } catch(e){
    try {
      await msalInstance.acquireTokenRedirect({ scopes:["Files.Read","Files.ReadWrite","Sites.Read.All"], account: msalAccount });
    } catch(e2){ return null; }
    return null;
  }
}

function signIn(){
  if(!msalInstance){ showToast("SharePoint auth not available"); return; }
  msalInstance.loginRedirect({ scopes:["Files.Read","Files.ReadWrite","Sites.Read.All"] });
}

function signOut(){
  if(msalInstance && msalAccount) msalInstance.logoutRedirect({ account: msalAccount });
  msalAccount = null;
  document.getElementById('sp-status').textContent = "Not signed in";
  document.getElementById('sp-status').classList.remove('signed-in');
  document.getElementById('signout-btn').classList.remove('visible');
  document.getElementById('signin-btn').classList.remove('hidden');
}

async function onSignedIn(){
  const name = msalAccount.name || msalAccount.username;
  document.getElementById('sp-status').textContent = `✓ ${name}`;
  document.getElementById('sp-status').classList.add('signed-in');
  document.getElementById('signin-btn').classList.add('hidden');
  document.getElementById('signout-btn').classList.add('visible');
  await Promise.all([loadDriversFromSharePoint(), loadConfigFromSharePoint()]);
  renderAll();
}

// ============================================================
// SHAREPOINT API
// ============================================================
async function loadDriversFromSharePoint(){
  const token = await getToken();
  if(!token) return;
  try {
    const url = `https://graph.microsoft.com/v1.0/drives/${DRIVE_ID}/items/${DRIVERS_FILE_ID}/workbook/worksheets`;
    const resp = await fetch(url, {headers:{Authorization:`Bearer ${token}`}});
    const data = await resp.json();
    if(!data.value) return;
    // Get last sheet
    const sheets = data.value;
    if(sheets.length === 0) return;
    const lastSheet = sheets[sheets.length-1];
    // Get used range
    const rangeUrl = `https://graph.microsoft.com/v1.0/drives/${DRIVE_ID}/items/${DRIVERS_FILE_ID}/workbook/worksheets/${encodeURIComponent(lastSheet.id)}/usedRange`;
    const rangeResp = await fetch(rangeUrl, {headers:{Authorization:`Bearer ${token}`}});
    const rangeData = await rangeResp.json();
    if(!rangeData.values || rangeData.values.length < 2) return;
    const headers = rangeData.values[0].map(h=> String(h||"").trim());
    const unitIdx = headers.findIndex(h=> h.includes("Unit"));
    const firstIdx = headers.findIndex(h=> h.toLowerCase()==="first");
    const lastIdx = headers.findIndex(h=> h.toLowerCase()==="last");
    const authIdx = headers.findIndex(h=> h.includes("FMCSA") || h.includes("Authority"));
    drivers = [];
    for(let i=1; i<rangeData.values.length; i++){
      const row = rangeData.values[i];
      const first = String(row[firstIdx]||"").trim();
      const last = String(row[lastIdx]||"").trim();
      if(!first || !last) continue;
      if(first.startsWith("Was") || last.startsWith("Was")) continue;
      drivers.push({
        unit: String(row[unitIdx]||"").trim(),
        first, last,
        auth: String(row[authIdx]||"").trim()
      });
    }
    drivers.sort((a,b)=> a.last.localeCompare(b.last));
  } catch(e){ console.warn("Failed to load drivers:", e); }
}

async function loadConfigFromSharePoint(){
  const token = await getToken();
  if(!token) return;
  try {
    const url = `https://graph.microsoft.com/v1.0/drives/${DRIVE_ID}/root:/${CONFIG_PATH}:/content`;
    const resp = await fetch(url, {headers:{Authorization:`Bearer ${token}`}});
    if(resp.status === 404){ return; } // doesn't exist yet
    if(!resp.ok){ return; }
    const data = await resp.json();
    if(data && typeof data === 'object'){
      config = { edits:{}, addedSteps:{}, deletedSteps:{}, customCards:[], ...data };
      if(config.customCards && config.customCards.length > 0){
        allCards = [...BASE_CARDS, ...config.customCards];
      }
    }
  } catch(e){ console.warn("Failed to load config:", e); }
}

async function saveConfigToSharePoint(){
  const token = await getToken();
  if(!token) return;
  try {
    const url = `https://graph.microsoft.com/v1.0/drives/${DRIVE_ID}/root:/${CONFIG_PATH}:/content`;
    await fetch(url, {
      method:'PUT', headers:{Authorization:`Bearer ${token}`, 'Content-Type':'application/json'},
      body: JSON.stringify(config, null, 2)
    });
  } catch(e){ console.warn("Failed to save config:", e); }
}

function scheduleConfigSave(){
  clearTimeout(configSaveTimer);
  configSaveTimer = setTimeout(saveConfigToSharePoint, 1500);
}

function renderHomeSections(){

  renderPinned();
  renderRecents();
}

function renderInProgress(){
  const el = document.getElementById('in-progress-list');
  if(sessions.length === 0){ el.innerHTML = '<p class="empty-state">No saved sessions</p>'; return; }
  el.innerHTML = sessions.map(s=>{
    const card = allCards.find(c=>c.id===s.cardId);
    const color = SECTION_COLORS[s.section]||"#888";
    const total = s.totalItems||0;
    const checked = s.checkedCount||0;
    const pct = total>0 ? Math.round(checked/total*100) : 0;
    return `<div class="session-card">
      <span class="sc-badge" style="background:${color}">${s.section}</span>
      <div class="sc-driver">${s.label}</div>
      <div class="sc-meta">${s.driverMeta||''}</div>
      <div class="sc-progress"><div class="sc-progress-fill" style="width:${pct}%"></div></div>
      <div class="sc-progress-label">${checked}/${total} items</div>
      <div class="sc-time">Saved ${timeAgo(s.savedAt)}</div>
      <div class="sc-actions">
        <button class="sc-open-btn" onclick="openSession('${s.id}')">Open</button>
        <button class="sc-del-btn" onclick="deleteSession('${s.id}',event)">Delete</button>
      </div>
    </div>`;
  }).join('');
}

function renderPinned(){
  const el = document.getElementById('pinned-list');
  const pinnedCards = pins.map(id=> allCards.find(c=>c.id===id)).filter(Boolean);
  if(pinnedCards.length===0){ el.innerHTML = '<p class="empty-state">Hover any card and click 📌 to pin it here</p>'; return; }
  el.innerHTML = pinnedCards.map(c=>miniCardHTML(c, true)).join('');
}

function renderRecents(){
  const el = document.getElementById('recents-list');
  if(recents.length===0){ el.innerHTML = '<p class="empty-state">Cards you open will appear here</p>'; return; }
  const cards = recents.map(r=>{ const c=allCards.find(x=>x.id===r.id); return c?{...r,card:c}:null; }).filter(Boolean);
  el.innerHTML = cards.map(r=>miniCardHTML(r.card, false, r.time)).join('');
}

function miniCardHTML(card, isPinned, time){
  const color = SECTION_COLORS[card.section]||"#888";
  const timeStr = time ? `<span class="mc-time">${timeAgo(time)}</span>` : '';
  return `<div class="mini-card${isPinned?' pinned':''}" onclick="openCard('${card.id}')">
    <span class="mc-badge" style="background:${color}"></span>
    <span class="mc-title">${card.title}</span>
    ${timeStr}
    <button class="pin-btn" onclick="togglePin('${card.id}',event)" title="${isPinned?'Unpin':'Pin'}">${isPinned?'📌':'📌'}</button>
  </div>`;
}

// ---- BROWSE ----
function renderBrowse(){
  // Build filter chips
  const chipsEl = document.getElementById('filter-chips');
  chipsEl.innerHTML = SECTIONS.map(s=>{
    const active = activeFilter===s;
    const color = SECTION_COLORS[s];
    return `<button class="chip${active?' active':''}" style="${active?`background:${color}`:''}" onclick="setFilter('${s}')">${s}</button>`;
  }).join('');
  renderCardGrid();
}

function renderCardGrid(){
  const query = (document.getElementById('search-input')||{}).value||"";
  const root = document.getElementById('card-grid-root');
  const filtered = allCards.filter(c=>{
    if(activeFilter && c.section!==activeFilter) return false;
    if(query){ const q=query.toLowerCase(); return c.title.toLowerCase().includes(q)||c.section.toLowerCase().includes(q); }
    return true;
  });
  // Group by section
  const groups = {};
  filtered.forEach(c=>{ if(!groups[c.section]) groups[c.section]=[]; groups[c.section].push(c); });
  const sectionsToShow = SECTIONS.filter(s=> groups[s] && groups[s].length>0);
  root.innerHTML = sectionsToShow.map(s=>`
    <div class="section-group">
      <div class="section-label">${s}</div>
      <div class="card-grid">
        ${groups[s].map(c=> procCardHTML(c)).join('')}
      </div>
    </div>
  `).join('');
}

function procCardHTML(card){
  const color = SECTION_COLORS[card.section]||"#888";
  const isPinned = pins.includes(card.id);
  const sub = card.isChecklist ? 'Checklist' : card.emailTemplate ? 'Email template' : '';
  return `<div class="proc-card${isPinned?' pinned':''}" onclick="openCard('${card.id}')">
    <div class="pc-badge" style="background:${color}">${card.section}</div>
    <div class="pc-title">${card.title}</div>
    ${sub?`<div class="pc-sub">${sub}</div>`:''}
    <button class="pin-btn" onclick="togglePin('${card.id}',event)" title="${isPinned?'Unpin':'Pin'}">📌</button>
  </div>`;
}

function filterCards(){ renderCardGrid(); }
function setFilter(s){
  activeFilter = activeFilter===s ? null : s;
  renderBrowse();
}

function openCard(id, sessionData){
  const card = allCards.find(c=>c.id===id);
  if(!card) return;
  currentCard = card;
  currentCheckboxStates = sessionData ? {...sessionData.checkboxStates} : {};
  // Track recent
  addToRecents(id);
  // Render modal
  const color = SECTION_COLORS[card.section]||"#888";
  document.getElementById('modal-badge').textContent = card.section;
  document.getElementById('modal-badge').style.background = color;
  document.getElementById('modal-title').textContent = card.title;
  const saveBtn = document.getElementById('modal-save-btn');
  saveBtn.classList.toggle('visible', !!card.isChecklist);
  const delBtn = document.getElementById('modal-delete-card-btn');
  delBtn.classList.toggle('visible', !!card.isCustom);
  document.getElementById('modal-body').innerHTML = renderCardBody(card, sessionData);
  openModal();
  if(sessionData) restoreContext(sessionData);
}

function openSession(sid){
  const s = sessions.find(x=>x.id===sid);
  if(!s) return;
  openCard(s.cardId, s);
}

function renderCardBody(card, sessionData){
  let html = '';
  if(card.isChecklist){
    html += renderDriverContext(card, sessionData);
  }
  if(card.emailTemplate){
    html += `<div style="background:var(--surface2);border-radius:var(--radius);padding:16px;font-family:'SF Mono','Fira Code',monospace;font-size:12px;line-height:1.7;white-space:pre-wrap;color:var(--text)">${escHtml(card.emailTemplate)}</div>`;
    return html;
  }
  if(card.steps){
    const steps = getEffectiveSteps(card);
    html += `<ol class="steps-list">`;
    steps.forEach((s,i)=>{
      const link = s.url ? `<a class="link-chip" href="${s.url}" target="_blank" rel="noopener">${s.linkLabel||chipLabel(s.url)}</a>` : '';
      html += `<li class="step-item">
        <span class="step-num">${i+1}</span>
        <span class="step-content">${escHtml(s.text)}${link}</span>
        <span class="step-actions">
          <button class="edit-btn" onclick="openEditPopup('step','${card.id}',${i},null,this)" title="Edit">✎</button>
          <button class="del-btn" onclick="deleteStep('${card.id}',${i})" title="Delete">✕</button>
        </span>
      </li>`;
    });
    html += `</ol>`;
    html += `<button class="add-step-btn" onclick="addStep('${card.id}')">+ Add step</button>`;
  }
  if(card.blocks){
    html += renderOwnerBlocks(card, false);
  }
  if(card.isChecklist){
    html += renderChecklistBlocks(card);
  }
  return html;
}

function renderChecklistBlocks(card){
  // KJ & Amie under disclosure, Before driver leaves and Your tasks always visible
  const hasKJ = card.kjItems && card.kjItems.length>0;
  const hasAmie = card.amieItems && card.amieItems.length>0;
  let html = '';
  if(hasKJ || hasAmie){
    html += `<div class="covering-disclosure">
      <button class="covering-toggle" onclick="toggleCovering(this)">▸ KJ & Amie tasks (covering only)</button>
      <div class="covering-content">`;
    if(hasKJ) html += renderOwnerBlock({label:"KJ does",color:"#3b82f6",items:card.kjItems}, card.id, 'kj');
    if(hasAmie) html += renderOwnerBlock({label:"Amie does",color:"#ec4899",items:card.amieItems}, card.id, 'amie');
    html += `</div></div>`;
  }
  if(card.beforeItems && card.beforeItems.length>0){
    html += renderOwnerBlock({label:"Before driver leaves — your tasks",color:"#f59e0b",items:card.beforeItems}, card.id, 'before');
  }
  if(card.yourItems && card.yourItems.length>0){
    html += renderOwnerBlock({label:"No rush — your tasks",color:"#10b981",items:card.yourItems}, card.id, 'your');
  }
  return html;
}

function renderOwnerBlocks(card, inCovering){
  return (card.blocks||[]).map((b,bi)=> renderOwnerBlock(b, card.id, bi)).join('');
}

function renderOwnerBlock(block, cardId, blockKey){
  const items = getEffectiveItems(cardId, blockKey, block.items);
  return `<div class="owner-block" style="background:${block.color}15;border:1px solid ${block.color}30">
    <div class="owner-block-header" style="background:${block.color}">${block.label}</div>
    <div class="owner-block-body">
      ${items.map((item,i)=> renderOwnerItem(item, cardId, blockKey, i)).join('')}
    </div>
    <button class="add-step-btn" onclick="addItem('${cardId}','${blockKey}')" style="margin:4px 8px 8px">+ Add item</button>
  </div>`;
}

function renderOwnerItem(item, cardId, blockKey, idx){
  const cbKey = `${cardId}__${blockKey}__${idx}`;
  const checked = currentCheckboxStates[cbKey]||false;
  const link = item.url ? `<a class="link-chip" href="${item.url}" target="_blank" rel="noopener">${item.linkLabel||chipLabel(item.url)}</a>` : '';
  return `<div class="owner-item">
    <input type="checkbox" onchange="toggleCheck('${cbKey}',this)" ${checked?'checked':''}>
    <span class="item-text${checked?' checked':''}" id="ot-${cbKey}">${escHtml(item.text)}${link}</span>
    <span class="item-edit-actions">
      <button class="edit-btn" onclick="openEditPopup('item','${cardId}',${idx},'${blockKey}',this)" title="Edit">✎</button>
      <button class="del-btn" onclick="deleteItem('${cardId}','${blockKey}',${idx})" title="Delete">✕</button>
    </span>
  </div>`;
}

function toggleCovering(btn){
  const content = btn.nextElementSibling;
  const open = content.classList.toggle('open');
  btn.textContent = (open?'▾':'▸') + ' KJ & Amie tasks (covering only)';
}

function toggleCheck(key, cb){
  currentCheckboxStates[key] = cb.checked;
  const el = document.getElementById('ot-'+key);
  if(el) el.classList.toggle('checked', cb.checked);
}

// ---- EFFECTIVE STEPS/ITEMS (applying config overrides) ----
function getEffectiveSteps(card){
  const base = card.steps||[];
  const edits = config.edits[card.id] || {};
  const added = config.addedSteps[card.id] || [];
  const deleted = config.deletedSteps[card.id] || [];
  let steps = base.map((s,i)=>{
    if(deleted.includes(i)) return null;
    if(edits[`step_${i}`]) return {...edits[`step_${i}`]};
    return typeof s==='string' ? {text:s} : s;
  }).filter(Boolean);
  steps = [...steps, ...added];
  return steps;
}

function getEffectiveItems(cardId, blockKey, baseItems){
  const edits = config.edits[`${cardId}__${blockKey}`] || {};
  const added = (config.addedSteps[`${cardId}__${blockKey}`]) || [];
  const deleted = (config.deletedSteps[`${cardId}__${blockKey}`]) || [];
  let items = (baseItems||[]).map((item,i)=>{
    if(deleted.includes(i)) return null;
    if(edits[`item_${i}`]) return {...edits[`item_${i}`]};
    return typeof item==='string' ? {text:item} : item;
  }).filter(Boolean);
  items = [...items, ...added];
  return items;
}

function renderDriverContext(card, sessionData){
  const driverOptions = drivers.length > 0
    ? drivers.map(d=>`<option value="${escHtml(d.last+','+d.first)}" data-unit="${escHtml(d.unit)}" data-auth="${escHtml(d.auth)}">${d.last}, ${d.first}</option>`).join('')
    : '<option disabled>Sign in to load drivers</option>';
  const sd = sessionData||{};
  return `<div class="driver-context">
    <h4>Driver Context</h4>
    <div class="ctx-row">
      <div class="ctx-field">
        <label>Driver</label>
        <select id="ctx-driver" onchange="onDriverSelect()">
          <option value="">Select driver…</option>
          ${driverOptions}
        </select>
      </div>
    </div>
    <div class="ctx-row">
      <div class="ctx-field"><label>Driver Name</label><input id="ctx-name" type="text" placeholder="First Last" value="${escHtml(sd.ctxName||'')}"></div>
      <div class="ctx-field"><label>Authority / LLC</label><input id="ctx-auth" type="text" placeholder="Authority name" value="${escHtml(sd.ctxAuth||'')}"></div>
    </div>
    <div class="ctx-row">
      <div class="ctx-field"><label>Current Truck #</label><input id="ctx-truck" type="text" placeholder="e.g. 835" value="${escHtml(sd.ctxTruck||'')}"></div>
      <div class="ctx-field"><label>New Truck #</label><input id="ctx-newtruck" type="text" placeholder="e.g. 779" value="${escHtml(sd.ctxNewTruck||'')}"></div>
      <div class="ctx-field"><label>DOT #</label><input id="ctx-dot" type="text" placeholder="Auto-fills" value="${escHtml(sd.ctxDot||'')}"></div>
    </div>
    <div class="ctx-folder-btns" id="ctx-folder-btns"></div>
    <button class="ctx-apply-btn" onclick="applyDriverContext()">Apply to checklist ↓</button>
  </div>`;
}

function onDriverSelect(){
  const sel = document.getElementById('ctx-driver');
  if(!sel || !sel.value) return;
  const opt = sel.options[sel.selectedIndex];
  const [last,first] = sel.value.split(',');
  document.getElementById('ctx-name').value = `${first} ${last}`;
  document.getElementById('ctx-truck').value = opt.dataset.unit||'';
  document.getElementById('ctx-auth').value = opt.dataset.auth||'';
  // DOT from auth — in the future can look up; for now leave blank for manual
  updateFolderLinks(last.trim(), first.trim(), opt.dataset.unit||'');
}

function updateFolderLinks(last, first, unit){
  const el = document.getElementById('ctx-folder-btns');
  if(!el) return;
  const driverPath = `Driver%20Documents/${encodeURIComponent(last + ', ' + first).replace(/%2C/g,',')}`;
  const truckPath = `Equipment/Tractors/${unit}`;
  const base = `${SP_SITE}/Shared%20Documents/`;
  el.innerHTML = `
    <a class="folder-link-btn" href="${base}${driverPath}" target="_blank" rel="noopener">📁 Driver folder</a>
    <a class="folder-link-btn" href="${base}${truckPath}" target="_blank" rel="noopener">🚚 Truck folder</a>
  `;
}

function restoreContext(sd){
  if(!sd.ctxName) return;
  const nameParts = sd.ctxName.split(' ');
  const first = nameParts.slice(0,nameParts.length-1).join(' ');
  const last = nameParts[nameParts.length-1];
  updateFolderLinks(last, first, sd.ctxTruck||'');
}

function applyDriverContext(){
  const name = (document.getElementById('ctx-name')||{}).value||'';
  const auth = (document.getElementById('ctx-auth')||{}).value||'';
  const truck = (document.getElementById('ctx-truck')||{}).value||'';
  const newTruck = (document.getElementById('ctx-newtruck')||{}).value||'';
  const dot = (document.getElementById('ctx-dot')||{}).value||'';
  // Replace tokens in all item texts
  const replTokens = (text)=> text
    .replace(/\[DRIVER\]/g, name||'[DRIVER]')
    .replace(/\[AUTH\]/g, auth||'[AUTH]')
    .replace(/\[OLD\]/g, truck||'[OLD]')
    .replace(/\[NEW\]/g, newTruck||'[NEW]')
    .replace(/\[DOT\]/g, dot||'[DOT]');
  // Update displayed text
  document.querySelectorAll('.item-text').forEach(el=>{
    el.dataset.original = el.dataset.original || el.textContent;
    el.firstChild.textContent = replTokens(el.firstChild.textContent||el.textContent);
  });
  document.querySelectorAll('.step-content').forEach(el=>{
    el.firstChild.textContent = replTokens(el.firstChild.textContent||el.textContent);
  });
  showToast("Context applied ✓");
}

// ============================================================
// SAVE / DELETE SESSIONS
// ============================================================
function countChecklistItems(card){
  let total = 0;
  ['kjItems','amieItems','beforeItems','yourItems'].forEach(k=>{ if(card[k]) total+=card[k].length; });
  if(card.blocks) card.blocks.forEach(b=>{ total+=b.items.length; });
  return total;
}

function saveSession(){
  if(!currentCard) return;
  const name = (document.getElementById('ctx-name')||{}).value||'';
  const auth = (document.getElementById('ctx-auth')||{}).value||'';
  const truck = (document.getElementById('ctx-truck')||{}).value||'';
  const newTruck = (document.getElementById('ctx-newtruck')||{}).value||'';
  const dot = (document.getElementById('ctx-dot')||{}).value||'';
  const total = countChecklistItems(currentCard);
  const checked = Object.values(currentCheckboxStates).filter(Boolean).length;
  const sid = 'sess_'+Date.now();
  const label = name ? `${currentCard.title} — ${name} #${truck}` : currentCard.title;
  const driverMeta = [auth, truck&&`Truck #${truck}`].filter(Boolean).join(' · ');
  const existing = sessions.findIndex(s=>s.cardId===currentCard.id && s.ctxName===name);
  const sessionObj = {
    id: existing>=0 ? sessions[existing].id : sid,
    cardId: currentCard.id, section: currentCard.section,
    label, driverMeta,
    ctxName:name, ctxAuth:auth, ctxTruck:truck, ctxNewTruck:newTruck, ctxDot:dot,
    checkboxStates:{...currentCheckboxStates},
    totalItems:total, checkedCount:checked,
    savedAt: Date.now()
  };
  if(existing>=0) sessions[existing] = sessionObj;
  else sessions.unshift(sessionObj);
  localStorage.setItem('uli_sessions', JSON.stringify(sessions));
  showToast("Progress saved ✓");
  renderInProgress();
}

function deleteSession(sid, e){
  e.stopPropagation();
  sessions = sessions.filter(s=>s.id!==sid);
  localStorage.setItem('uli_sessions', JSON.stringify(sessions));
  renderInProgress();
}

// ============================================================
// RECENTS & PINS
// ============================================================
function addToRecents(id){
  recents = recents.filter(r=>r.id!==id);
  recents.unshift({id, time:Date.now()});
  if(recents.length>8) recents=recents.slice(0,8);
  localStorage.setItem('uli_recents', JSON.stringify(recents));
}

function clearRecents(){ recents=[]; localStorage.setItem('uli_recents','[]'); renderRecents(); }

function togglePin(id, e){
  e.stopPropagation();
  if(pins.includes(id)) pins=pins.filter(p=>p!==id);
  else pins.unshift(id);
  localStorage.setItem('uli_pins', JSON.stringify(pins));
  renderPinned();
  renderCardGrid();
}

// ============================================================
// EDIT POPUP
// ============================================================
function openEditPopup(type, cardId, idx, blockKey, btn){
  editTarget = {type, cardId, idx, blockKey: blockKey==='null'?null:blockKey};
  let item;
  if(type==='step'){
    const steps = getEffectiveSteps(allCards.find(c=>c.id===cardId));
    item = steps[idx] || {};
  } else {
    const card = allCards.find(c=>c.id===cardId);
    const block = getBlockByKey(card, blockKey);
    const items = getEffectiveItems(cardId, blockKey, block?block.items:[]);
    item = items[idx] || {};
  }
  document.getElementById('ep-text').value = typeof item==='string' ? item : item.text||'';
  document.getElementById('ep-link-label').value = item.linkLabel||'';
  document.getElementById('ep-url').value = item.url||'';
  const popup = document.getElementById('edit-popup');
  const rect = btn.getBoundingClientRect();
  popup.style.top = Math.min(rect.bottom+8, window.innerHeight-300)+'px';
  popup.style.left = Math.max(8, Math.min(rect.left, window.innerWidth-310))+'px';
  popup.classList.add('open');
}

function closeEditPopup(){ document.getElementById('edit-popup').classList.remove('open'); editTarget=null; }

function saveEdit(){
  if(!editTarget) return;
  const {type, cardId, idx, blockKey} = editTarget;
  const text = document.getElementById('ep-text').value.trim();
  const linkLabel = document.getElementById('ep-link-label').value.trim();
  const url = document.getElementById('ep-url').value.trim();
  const newItem = {text, ...(url?{url}:{}), ...(linkLabel?{linkLabel}:{})};
  if(type==='step'){
    if(!config.edits[cardId]) config.edits[cardId]={};
    config.edits[cardId][`step_${idx}`] = newItem;
  } else {
    const key = `${cardId}__${blockKey}`;
    if(!config.edits[key]) config.edits[key]={};
    config.edits[key][`item_${idx}`] = newItem;
  }
  scheduleConfigSave();
  closeEditPopup();
  // Re-render modal body
  document.getElementById('modal-body').innerHTML = renderCardBody(currentCard);
  showToast("Saved ✓");
}

function resetEdit(){
  if(!editTarget) return;
  const {type, cardId, idx, blockKey} = editTarget;
  if(type==='step'){
    if(config.edits[cardId]) delete config.edits[cardId][`step_${idx}`];
  } else {
    const key = `${cardId}__${blockKey}`;
    if(config.edits[key]) delete config.edits[key][`item_${idx}`];
  }
  scheduleConfigSave();
  closeEditPopup();
  document.getElementById('modal-body').innerHTML = renderCardBody(currentCard);
  showToast("Reset to original ✓");
}

function deleteStep(cardId, idx){
  if(!config.deletedSteps[cardId]) config.deletedSteps[cardId]=[];
  config.deletedSteps[cardId].push(idx);
  scheduleConfigSave();
  document.getElementById('modal-body').innerHTML = renderCardBody(currentCard);
}

function deleteItem(cardId, blockKey, idx){
  const key = `${cardId}__${blockKey}`;
  if(!config.deletedSteps[key]) config.deletedSteps[key]=[];
  config.deletedSteps[key].push(idx);
  scheduleConfigSave();
  document.getElementById('modal-body').innerHTML = renderCardBody(currentCard);
}

function addStep(cardId){
  const text = prompt("New step text:");
  if(!text) return;
  if(!config.addedSteps[cardId]) config.addedSteps[cardId]=[];
  config.addedSteps[cardId].push({text});
  scheduleConfigSave();
  document.getElementById('modal-body').innerHTML = renderCardBody(currentCard);
}

function addItem(cardId, blockKey){
  const text = prompt("New item text:");
  if(!text) return;
  const key = `${cardId}__${blockKey}`;
  if(!config.addedSteps[key]) config.addedSteps[key]=[];
  config.addedSteps[key].push({text});
  scheduleConfigSave();
  document.getElementById('modal-body').innerHTML = renderCardBody(currentCard);
}

function getBlockByKey(card, blockKey){
  if(!card) return null;
  if(typeof blockKey==='number'||!isNaN(blockKey)) return (card.blocks||[])[parseInt(blockKey)];
  if(blockKey==='kj') return {items:card.kjItems||[]};
  if(blockKey==='amie') return {items:card.amieItems||[]};
  if(blockKey==='before') return {items:card.beforeItems||[]};
  if(blockKey==='your') return {items:card.yourItems||[]};
  return null;
}
