  // listKey: "steps" or a block id
  function cardDefaultItemMode(card, listKey, opts){
    if(card && (card.defaultMode==="number" || card.defaultMode==="check")) return card.defaultMode;
    // Preserve the original built-in behavior until a card default is chosen:
    // main steps are numbered; owner/task blocks are checkboxes.
    if(opts && opts.ordered) return "number";
    if(opts && opts.checkbox) return "check";
    return "check";
  }
  function effectiveCardDefaultMode(card){
    if(card && (card.defaultMode==="number" || card.defaultMode==="check")) return card.defaultMode;
    var hasSteps=!!(card && card.steps && card.steps.length);
    var hasBlocks=!!(card && card.blocks && card.blocks.length);
    if(hasSteps && !hasBlocks) return "number";
    return "check";
  }
  function itemDisplayMode(card, listKey, item, opts){
    var m=item && item.mode;
    if(m==="number" || m==="check") return m;
    return cardDefaultItemMode(card, listKey, opts);
  }
  function modeName(mode){ return mode==="number" ? "Numbers" : "Checkboxes"; }

  function renderList(card, listKey, items, opts){
    var ctx=modalState.ctx;
    var list = (listKey==="steps") ? el("ol",{class:"steps"}) : el("div",{class:"steps"});

    items.forEach(function(it){
      // conditional visibility: new-auth-only + custom special-instruction toggles
      var newAuthHidden = it.newAuthOnly && card.eventType==="authority-change" && !modalState.brandNewAuth;
      var toggleHidden = it.toggle && !toggleOn(it.toggle);
      var row=el("div",{class:"row"});
      row.setAttribute("data-list", listKey);
      row.setAttribute("data-id", it.id);
      if((newAuthHidden || toggleHidden) && !modalState.editMode){ row.classList.add("hidden"); }

      if(modalState.editMode){

        row.appendChild(handle);

        row.classList.add("editing-on");
      }

      var displayMode=itemDisplayMode(card, listKey, it, opts);
      if(displayMode==="number"){
        row.appendChild(el("span",{class:"num"}));
      }else if(displayMode==="check"){
        var cb=el("input",{type:"checkbox", class:"cb"});
        cb.setAttribute("data-id", it.id);
        cb.checked=!!modalState.checks[it.id];
        if(cb.checked) row.classList.add("checked");
        cb.addEventListener("change", function(){
          modalState.checks[it.id]=cb.checked;
          row.classList.toggle("checked", cb.checked);
        });
        row.appendChild(cb);
      }

      var txtSpan=el("span",{class:"txt"});
      var displayText = substitute(it.text, ctx);
      displayText = enrichChecklistText(displayText, ctx, card);
      txtSpan.appendChild(document.createTextNode(displayText));
      if(it.newAuthOnly){ txtSpan.appendChild(el("span",{class:"new-auth-only", text:"new auth only"})); }
      if(it.toggle){ var _tg=cardToggle(card, it.toggle); if(_tg) txtSpan.appendChild(el("span",{class:"only-marker", text:"only: "+_tg.label})); }
      if(it.linkUrl){

        txtSpan.appendChild(el("a",{class:"chip-link", href:it.linkUrl, target:"_blank", rel:"noopener", text:label, onclick:function(e){ e.stopPropagation(); }}));
      }

      if(modalState.editMode){

          el("button",{class:"mini del", title:"Delete", text:"✕", onclick:function(e){ e.stopPropagation(); deleteItem(card.id, listKey, it.id); }})
        );
        row.appendChild(ctrls);

      row.appendChild(el("button",{class:"note-btn"+(modalState.notes[it.id]?" has":""), title:modalState.notes[it.id]?"Edit note":"Add note", text:"📝", onclick:function(e){ e.stopPropagation(); openNoteEditor(it.id); }}));
      list.appendChild(row);

        }

      }
    });

    if(modalState.editMode){
      var addBtn=el("button",{class:"btn small add-item", text: opts.ordered?"+ Add step":"+ Add item", onclick:function(){ addItem(card.id, listKey); }});
      var holder=el("div"); holder.appendChild(list); holder.appendChild(addBtn);
      return holder;
    }
    return list;
  }

  /* ----- edit operations ----- */
  function getList(mutCard, listKey){
    if(listKey==="steps"){ if(!mutCard.steps) mutCard.steps=[]; return mutCard.steps; }
    if(!mutCard.blocks) return [];
    for(var i=0;i<mutCard.blocks.length;i++) if(mutCard.blocks[i].id===listKey) return mutCard.blocks[i].items || (mutCard.blocks[i].items=[]);
    return [];
  }
  function reRenderModalPreserving(){

  function addItem(cardId, listKey){

    touchCard(cardId); scheduleSave(); reRenderModalPreserving();

  function deleteItem(cardId, listKey, itemId){

    var i=list.findIndex(function(x){return x.id===itemId;});
    if(i>=0) list.splice(i,1);
    delete modalState.checks[itemId];
    touchCard(cardId); scheduleSave(); reRenderModalPreserving();
  }
  function moveWithin(list, fromId, toId, after){
    var fi=list.findIndex(function(x){return x.id===fromId;}); if(fi<0) return;
    var item=list.splice(fi,1)[0];
    var ti=list.findIndex(function(x){return x.id===toId;});
    if(ti<0){ list.push(item); return; }
    if(after) ti+=1;
    list.splice(ti,0,item);
  }

  /* ----- drag & drop ----- */
  var dragInfo=null;
  function attachDrag(row, handle, card, listKey, itemId){
    handle.addEventListener("mousedown", function(){ row.setAttribute("draggable","true"); });
    handle.addEventListener("touchstart", function(){ row.setAttribute("draggable","true"); });
    row.addEventListener("dragstart", function(e){
      dragInfo={cardId:card.id, listKey:listKey, id:itemId};
      row.classList.add("drag-ghost");
      try{ e.dataTransfer.effectAllowed="move"; e.dataTransfer.setData("text/plain", itemId); }catch(_){}
    });
    row.addEventListener("dragend", function(){ row.classList.add("drag-ghost"); row.classList.remove("drag-ghost"); row.removeAttribute("draggable"); clearDragMarks(); dragInfo=null; });
    row.addEventListener("dragover", function(e){
      if(!dragInfo || dragInfo.listKey!==listKey) return;
      e.preventDefault();
      var rect=row.getBoundingClientRect(); var after=(e.clientY-rect.top)>rect.height/2;
      clearDragMarks();
      row.classList.add(after?"drag-over-bot":"drag-over-top");
    });
    row.addEventListener("drop", function(e){
      if(!dragInfo || dragInfo.listKey!==listKey) return;
      e.preventDefault();
      var rect=row.getBoundingClientRect(); var after=(e.clientY-rect.top)>rect.height/2;
      var mut=getMutableCard(card.id); var list=getList(mut, listKey);
      if(dragInfo.id!==itemId){ moveWithin(list, dragInfo.id, itemId, after); touchCard(card.id); scheduleSave(); }
      clearDragMarks(); dragInfo=null;
      reRenderModalPreserving();
    });
  }
  function clearDragMarks(){ mBody.querySelectorAll(".drag-over-top,.drag-over-bot").forEach(function(r){ r.classList.remove("drag-over-top","drag-over-bot"); }); }

  /* ----- edit popup ----- */

  function graph(url, opts){
    opts=opts||{};

      var h=opts.headers||{}; h["Authorization"]="Bearer "+tok;
      var full=url.indexOf("http")===0?url:("https://graph.microsoft.com/v1.0"+url);
      return fetch(full, { method:opts.method||"GET", headers:h, body:opts.body });
    }).then(function(r){
      if(r.status===404) return {__notfound:true};
      if(!r.ok) return r.text().then(function(t){ return Promise.reject(r.status+" "+t.slice(0,180)); });
      var ct=r.headers.get("content-type")||"";
      return ct.indexOf("json")>=0 ? r.json() : r.text();
    });
  }

  }
  function readSheet(name){
    var p="/drives/"+S365.driveId+"/items/"+S365.item+"/workbook/worksheets('"+encodeURIComponent(name)+"')/usedRange(valuesOnly=true)?$select=values";
    return graph(p).then(function(r){ return (r && r.values) || []; });
  }
  function colIndex(head, want){
    if(!want) return -1; var w=String(want).trim().toLowerCase();
    for(var i=0;i<head.length;i++){ if(String(head[i]).trim().toLowerCase()===w) return i; }
    for(var j=0;j<head.length;j++){ if(String(head[j]).trim().toLowerCase().indexOf(w)>=0) return j; }
    return -1;
  }
  function loadRoster(){
    var m=config.mapping;
    return readSheet(m.worksheet).then(function(vals){
      if(!vals.length){ S365.roster={drivers:[],trucks:[],authorities:[],byDriver:{}}; return; }
      var head=vals[0];
      var iF=colIndex(head,m.colFirst), iL=colIndex(head,m.colLast), iN=colIndex(head,m.colName);
      var iT=colIndex(head,m.colTruck), iA=colIndex(head,m.colAuthority), iD=colIndex(head,m.colDot);
      var drivers=[], trucks={}, auths={}, byDriver={}, byAuthorityDot={};
      for(var r=1;r<vals.length;r++){
        var row=vals[r]; if(!row) continue;
        var name="";
        if(m.nameMode==="full" && iN>=0) name=String(row[iN]||"").trim();
        else { var f=iF>=0?String(row[iF]||"").trim():"", l=iL>=0?String(row[iL]||"").trim():""; name=(l||"")+((l&&f)?", ":"")+(f||""); }
        var truck=iT>=0?String(row[iT]||"").trim():"", aut=iA>=0?String(row[iA]||"").trim():"", dot=iD>=0?String(row[iD]||"").trim():"";
        if(!name && !truck && !aut) continue;
        var rec={name:name, truck:truck, authority:aut, dot:dot};
        if(name){ var key=name+(truck?(" #"+truck):""); drivers.push({key:key, label:key}); byDriver[key]=rec; }
        if(truck) trucks[truck]=1;
        if(aut){
          auths[aut]=1;
          var authKey=aut.trim().toLowerCase();
          if(dot && !byAuthorityDot[authKey]) byAuthorityDot[authKey]=dot;
        }
      }
      var sortAlpha=function(a,b){ return String(a).localeCompare(String(b), undefined, {sensitivity:"base", numeric:true}); };
      S365.roster={ drivers:drivers, trucks:Object.keys(trucks), authorities:Object.keys(auths).sort(sortAlpha), byDriver:byDriver, byAuthorityDot:byAuthorityDot };
    });
  }

  function onPickDriver(key, card){
    if(!S365.roster || !S365.roster.byDriver[key]) return;
    captureContextForm();
    var rec=S365.roster.byDriver[key], v=modalState.formValues, et=card.eventType;
    v.driverpick=key; v.driver=rec.name;
    if(et==="authority-change"){ v.oldauth=rec.authority||""; v.olddot=rec.dot||""; v.old=rec.truck||""; v.new=rec.truck||""; }
    else if(et==="perm-truck" || et==="temp-truck"){ v.auth=rec.authority||""; v.dot=rec.dot||""; v.old=rec.truck||""; }
    else if(et==="new-driver"){ v.auth=rec.authority||""; v.dot=rec.dot||""; v.new=rec.truck||""; }
    else { v.auth=rec.authority||""; v.dot=rec.dot||""; v.old=rec.truck||""; }
    applyContext(); captureChecks(); renderModal();
  }

  /* ----- shared config in SharePoint ----- */
  function normalizeConfigPath(path){
    path=String(path||SP.configFile).trim().replace(/^\/+/,"").replace(/\\/g,"/").replace(/\/{2,}/g,"/");
    return path || SP.configFile;
  }
  function normalizeConfigStorage(storage){
    return String(storage||SP.configStorage).toLowerCase()==="sharepoint" ? "sharepoint" : "onedrive";
  }
  function activeConfigFile(){ return normalizeConfigPath(config.remoteConfigPath || SP.configFile); }
  function activeConfigStorage(){ return normalizeConfigStorage(config.remoteConfigStorage || SP.configStorage); }
  function configLocationLabel(storage){ return normalizeConfigStorage(storage)==="sharepoint" ? "SharePoint Documents" : "OneDrive My Files"; }
  function encodeDrivePath(path){ return normalizeConfigPath(path).split("/").map(encodeURIComponent).join("/"); }
  function configPath(path, storage){
    var encoded=encodeDrivePath(path || activeConfigFile());
    return normalizeConfigStorage(storage || activeConfigStorage())==="onedrive"
      ? "/me/drive/root:/"+encoded
      : "/drives/"+S365.driveId+"/root:/"+encoded;
  }
  function applyRemoteConfig(remote){
    if(remote && typeof remote==="object"){
      if(remote.cardOverrides) config.cardOverrides=remote.cardOverrides;
      if(remote.customCards) config.customCards=remote.customCards;
      if(remote.hiddenCards) config.hiddenCards=remote.hiddenCards;
      if(remote.mapping) config.mapping=remote.mapping;
      if(remote.remoteConfigStorage) config.remoteConfigStorage=normalizeConfigStorage(remote.remoteConfigStorage);
      if(remote.remoteConfigPath) config.remoteConfigPath=normalizeConfigPath(remote.remoteConfigPath);
      try{ localStorage.setItem(CFG_KEY, JSON.stringify(config)); }catch(e){}
    }
  }
  function readRemoteConfigAt(path, storage){
    storage=normalizeConfigStorage(storage || activeConfigStorage());
    return graph(configPath(path, storage)+":/content").then(function(data){
      if(data && data.__notfound) return false;
      var remote = (typeof data==="string") ? JSON.parse(data) : data;
      applyRemoteConfig(remote);
      S365.remote.present=true; S365.remote.path=normalizeConfigPath(path); S365.remote.storage=storage;
      graph(configPath(path, storage)+"?$select=eTag,lastModifiedDateTime,lastModifiedBy").then(function(meta){
        if(meta && !meta.__notfound){ S365.remote.eTag=meta.eTag; S365.remote.at=meta.lastModifiedDateTime;
          S365.remote.by=meta.lastModifiedBy && meta.lastModifiedBy.user && meta.lastModifiedBy.user.displayName; }
      }).catch(function(){});
      return true;
    });
  }
  function loadRemoteConfig(){
    var preferred=activeConfigFile(), preferredStorage=activeConfigStorage();
    return readRemoteConfigAt(preferred, preferredStorage).then(function(found){
      if(found) return;
      S365.remote.present=false;
      var legacy=(SP.legacyConfigFiles||[]).filter(function(x){ return x.path!==preferred || normalizeConfigStorage(x.storage)!==preferredStorage; });
      var i=0;
      function tryNext(){
        if(i>=legacy.length) return;
        var x=legacy[i++];
        return readRemoteConfigAt(x.path, x.storage).then(function(foundLegacy){
          if(foundLegacy){
            // Borrow old data once so nothing is lost, then save it to the shared location.
            config.remoteConfigStorage=preferredStorage;
            config.remoteConfigPath=preferred;
            S365.remote.loadedFromLegacy=true;
            try{ localStorage.setItem(CFG_KEY, JSON.stringify(config)); }catch(e){}
            pushRemoteConfig();   // migrate borrowed data into the shared SharePoint file
            return;
          }
          return tryNext();
        });
      }
      return tryNext();
    }).catch(function(e){ console.warn("loadRemoteConfig", e); });
  }
  function pushRemoteConfig(){
    if(!S365.signedIn) return;        // local-only until signed in
    setSync("saving","Saving…");
    var payload={ version:1, savedAt:new Date().toISOString(), remoteConfigStorage:activeConfigStorage(), remoteConfigPath:activeConfigFile(),
      cardOverrides:config.cardOverrides, customCards:config.customCards, hiddenCards:config.hiddenCards, mapping:config.mapping };
    graph(configPath()+":/content", { method:"PUT", body:JSON.stringify(payload,null,2), headers:{"Content-Type":"application/json"} })
      .then(function(){ S365.remote.present=true; S365.remote.storage=activeConfigStorage(); S365.remote.path=activeConfigFile(); setSync("ok","Synced ✓"); })
      .catch(function(e){ if(String(e).indexOf("403")>=0) setSync("err","No write access"); else setSync("err","Save failed — local only"); });
  }

  /* ----- settings modal ----- */
  function openSettings(){ document.getElementById("settings-overlay").classList.remove("hidden"); document.body.style.overflow="hidden"; renderSettings(); }
  function closeSettings(){ document.getElementById("settings-overlay").classList.add("hidden"); document.body.style.overflow=""; }
  function renderSettings(){
    var body=document.getElementById("settings-body"); body.textContent=""; var m=config.mapping;
    var st=el("div",{class:"settings-status"});
    if(S365.signedIn){
      st.appendChild(el("div",{}, el("b",{text:"Signed in: "}), (S365.account.username||S365.account.name||"")));
      st.appendChild(el("div",{}, el("b",{text:"Fleet sheet: "}), S365.item?"connected":"not found"));
      st.appendChild(el("div",{}, el("b",{text:"Saved JSON: "}), S365.remote.present?("syncing to "+configLocationLabel(S365.remote.storage)+(S365.remote.by?(" · last edit by "+S365.remote.by):"")):"not created yet (saves on first edit)"));
      st.appendChild(el("div",{}, el("b",{text:"JSON path: "}), configLocationLabel(activeConfigStorage())+" / "+activeConfigFile()));
    } else {
      st.appendChild(el("div",{text:"Not signed in. Use Sign in (top right) to load drivers and sync edits across the office."}));
    }
    body.appendChild(st);
    if(!S365.signedIn) return;

    var stoRow=el("div",{class:"settings-row"}); stoRow.appendChild(el("label",{text:"Where shared edits are saved"}));
    var stoSel=el("select",{id:"set-config-storage"});
    [["sharepoint","SharePoint Documents (shared with the office)"],["onedrive","OneDrive My Files (only me)"]].forEach(function(p){ var o=el("option",{value:p[0],text:p[1]}); if(p[0]===activeConfigStorage())o.selected=true; stoSel.appendChild(o); });
    stoRow.appendChild(stoSel); body.appendChild(stoRow);
    body.appendChild(colRow("JSON file name / path","set-config-path",activeConfigFile()));
    body.appendChild(el("p",{class:"note",text:"For everyone to see your card edits, keep this on SharePoint Documents — the shared site library. OneDrive My Files only syncs to you. Any folders in the path must already exist."}));

    var wsRow=el("div",{class:"settings-row"}); wsRow.appendChild(el("label",{text:"Worksheet (tab) to read"}));
    var wsSel=el("select",{id:"set-ws"}); (S365.worksheets.length?S365.worksheets:[m.worksheet]).forEach(function(n){ var o=el("option",{value:n,text:n}); if(n===m.worksheet)o.selected=true; wsSel.appendChild(o); });
    wsRow.appendChild(wsSel); body.appendChild(wsRow);

    var nmRow=el("div",{class:"settings-row"}); nmRow.appendChild(el("label",{text:"Driver name comes from"}));
    var nmSel=el("select",{id:"set-namemode"}); [["firstlast","Two columns (First + Last)"],["full","One column (full name)"]].forEach(function(p){ var o=el("option",{value:p[0],text:p[1]}); if(p[0]===m.nameMode)o.selected=true; nmSel.appendChild(o); });
    nmRow.appendChild(nmSel); body.appendChild(nmRow);

    body.appendChild(colRow("First-name column","set-first",m.colFirst));
    body.appendChild(colRow("Last-name column","set-last",m.colLast));
    body.appendChild(colRow("Full-name column","set-name",m.colName));
    body.appendChild(colRow("Truck # column","set-truck",m.colTruck));
    body.appendChild(colRow("Authority column","set-auth",m.colAuthority));
    body.appendChild(colRow("DOT # column","set-dot",m.colDot));
    body.appendChild(el("p",{class:"note",text:"Type the exact column header text from your sheet. Matching is case-insensitive and allows partial matches."}));

    body.appendChild(el("div",{style:"display:flex;gap:10px;justify-content:flex-end;margin-top:6px"},
      el("button",{class:"btn",text:"Reload data", onclick:function(){ saveMapping(false); setSync("saving","Reloading…"); loadRoster().then(function(){ setSync("ok","Synced ✓"); rerenderAll(); renderSettings(); }).catch(function(){ setSync("err","Couldn’t read that tab"); }); }}),
      el("button",{class:"btn primary",text:"Save mapping", onclick:function(){ saveMapping(true); loadRoster().then(function(){ rerenderAll(); closeSettings(); }).catch(function(){ closeSettings(); }); }})
    ));

    function colRow(lbl,id,val){ var r=el("div",{class:"settings-row"}); r.appendChild(el("label",{text:lbl})); var i=el("input",{type:"text",id:id}); i.value=val||""; r.appendChild(i); return r; }
  }
  function saveMapping(persist){
    function gv(id){ var e=document.getElementById(id); return e?e.value:""; }
    config.remoteConfigStorage=normalizeConfigStorage(gv("set-config-storage") || activeConfigStorage());
    config.remoteConfigPath=normalizeConfigPath(gv("set-config-path") || config.remoteConfigPath || SP.configFile);
    config.mapping={ worksheet:gv("set-ws")||config.mapping.worksheet, nameMode:gv("set-namemode")||"firstlast",
      colName:gv("set-name"), colFirst:gv("set-first"), colLast:gv("set-last"),
      colTruck:gv("set-truck"), colAuthority:gv("set-auth"), colDot:gv("set-dot") };
    if(persist) scheduleSave();
  }

  /* ---------- boot ---------- */
  renderHome();
  m365Init();
})();
</script>
</body>
